  text: 唐孫樵集第一卷
  hash: sha256:e46bed1555671e519b91b14fe99551698f52693a138c80c7c42eaaba73c7b7aa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0083_SBCK_001-1a}
body:
  text: 大明宮賦露臺遺基賦出蜀賦大明宮賦一作大明宮紀夢孫樵齒貢士名旅見大明宮前庭仰眙俯駭陰意靈怪暮歸魄動中宵而㝱㝱彼大明宮神前有云且曰太宗皇帝繚瀛啓居廓穹起廬圜然而劃隆然而赫孰窬孰隟永求帝宅帝詔吾司其宮立大明宮後高自注太宗創焉下帝謂上帝宗增修遂移仗與日月終翼聖護艱十有六君蕩妖斬氛孰知吾勤吾當廬陵錫􅐥廢中宗為廬陵王賜姓􅐥氏自注天后即真天下號周廟祏徹主注自􅐥廟為七削唐廟為五司禮博士周宗奏增吾則協二毗輔注自魏公元忠也謂梁公仁傑左右提護義甲憤徒起帝仆周仙殿迫后歸政天后驚默還臥明日自注五王興輦帝出東宫斬賊迎復唐革周吾則械二黠雛宗易之也自注謂昌俾即其誅胡猘飽腯祿山也自注謂踣肌齚骨驚血濺闕仰吠白日二聖各轍大麓北挈肅宗遂自注靈􅐥即位于吾則激髯孽悖節慶緒也自注謂俾濟逆殺翼兩傑憤烈王及臨淮王自注謂汾陽俾克斫滅薊梟妖狂朱泚也自注謂突集五堂縱啄怒吞大駕驚奔吾則勵陰刀翦其翼俾不得逃明殛三革蝕黑孰匪吾力吾見若正聲在懸諍舌在軒輟黈延諫刳襟沃善賞必正名怒必正刑當獄撤腥遇行刑謂之御自注太宗每諫當稼吞螟吾則入瀆革濁中河屢清自注貞觀入囿肉角觀中麟見自注貞旬澤暮溥平十日一自注太以夜雨雨必㪷穀視土斗米五文錢自注開元中吾見若姧聲在堂諛舌在㫄窒聰怫諷正斥邪寵嘉賞失節怒罰失殺奪農而徭厚天而雕吾則反耀而彗章中彗星屢見自注永崇總反澤而沴蕩坤而坼復合終日不止自注地有坼而裂乾而石注自而殞石天有裂然吾留帝意一作宮中二百年昔亦日月今亦日月往孰為設今孰為缺籍民其凋有野而蒿九百萬今二百萬自注開元中籍戶籍甲其虛有壘而墟三時務農一時講􅐥寶自注開元中籍府兵給疲農而幕府多虛者也甲總六十萬今天下兵仰西垣何縮匹馬不牧隴西平涼天水金城四郡息馬匹至自注開元中北庭拒鄰門萬三千董之是時帛匹易馬一七十萬榖四十八監以使北垣何蹙孤壘城粒言未及闋樵迎斬其舌且曰余聞宰獲其哲杜姚宋自注房得是赫日烈老魅跡結爾曾何伐宰獲其慝甫敬宗自注林得是昏蝕魅怪橫惑爾曾何力今者日白風清忠簡盈庭闔南俟霈闔北俟霽矧帝城闐闐何賴窮邊帑廩如封何賴疲農禁甲飽寧尚何用天下兵神曾何知孰愧往時神不能對退而笑曰孫樵誰欺乎欺古乎欺今乎吁露臺遺基賦并序􅐥皇郊天明年作望仙臺於城之南農事方殷而興土功且有麋於縣官也樵東過驪山得露臺遺基遂作賦以諷之驪橫秦原東走盤連有土如積其高逾尺隱于修岡屹若環堂徘徊山下問于牧者對曰唯昔漢文為天下君守以恭默民無怨慝天下大同帝駕而東經營相視兹山之址乃因其崇以興土功兹臺始基軫于帝思既命其吏校之經費乃下詔曰朕以涼德君于萬國唯日兢兢如滔春氷高祖惠宗肇造我邦我邦圪一作肇作此宫室庶幾無逸逮天朕躬孰敢加隆矧靡府財以經此臺周為靈臺成乎子來文王以升以考休徵兹臺以平周德唯馨章華雖高楚民亦勞靈王宣驕諸矦不朝民既攜二王遂以死豈朕不懲斯役實興鳩材嘯工以害三農斯豈文王靈臺之不日哉宜詔有司亟令罷之此其基者乎卒歌而去之且曰彼通天兮鞅埃壒之巍巍此靈臺兮蔽秋草之離離巳而巳而世無比兮吾孰知其是非出蜀賦辛酉之直年兮引敗車而還秦濟潼梓之重江兮出大劒之復門駭天險之重阻兮峙連岡而外坤譎石詭崖汨其城屬兮屹紆鬱於雲昏嵌嵒嵒而查牙兮上攢羅而戞天中呀坼以隙斜兮途詰屈而隘穿以去以來奔蹄疾足兮鼠出入乎穴間蹇余馬之不息届峽山之逼側劃崇巒之怒來水涵空而混碧途迫高而緣深不尺直而又曲跬危步之促促栗若跣而蹈棘朝天雙峙以虧蔽中慘栗而陰翳倐下馳而上回若出地而天開龍堂呀呀而上啓怪若虎而欲噬泉觱沸而中洌靈窸窣乎像設盼山川以懷古得籌筆於途說指前峯之孤秀傳臥龍之餘烈嘗枚師而北去抗霸圖而此決曾尺疆之不闢徒齎志而灰滅越百牢而南指憩石門之委邃六陰崖而戶開屹巍巍以皚皚外攢怪石之參差兮勢嶪峩而上排狀若鬱雲之始騰又似乎潮波之却頽中􅌄窱以窙豁敞曭朗而洞逹摧嵓泉之瀯瀯鏘環珮於閨闥躡危石而後通忽泱漭而無窮包溪懷壑而為深兮繚巒岡而四崇蘿薜羃歷於嵓穴兮雲木森其青蔥鬱桂椒與木蘭兮芬淑郁而駭風曾不可以久留兮車軋軋而又東陟雞幘之蹇嶇下七折之峻坂褒斜吁其隘束兮左窮溪兮右重巘綿飛棧而屬危梁兮續畏途而呀斷下臨千仞之驚流兮波澒洞而雷抃當玄冬之隆烈觸密雪之飛噴舞回飈而揚九垠天地紛其漫漫路縈積以迷沒馬蕭蕭而不進心悸悸而程不敢逸兮徒憭栗而興嘆出大散之奧區若脫足於囚拘涉汧渭之沄沄歷岐雍之通途田原鬱以澶漫兮彌千里而為都背槐里而趨咸陽兮索嬴劉之舊墟承明冀關緬以夷漫兮得隱嶙之顔隅獨五陵之尚完兀高平而草蕪抵長都之岌岌排閶闔而西入荷天衢之廣關仰白日之赫赫彀弱弓而滿鉛鏃兮即澤宫而睨的夫何號貢之缺條兮忽有司之吾斥曾不得而上通兮居悒悒而不適闕庭藹其多士兮皆云夫賢索不自分其能否兮瞰朱門之投蹟蔑一人之我先若捧水而投石念初心之來斯豈窮愁而徒疑忽徊徊以惶惶蹇東西而獨悲因默默以心計兮私展轉而自非胡不知進之與道謀兮徒盛氣而憤時不知求巳以為慮兮而患人之不知九衢廣其茫茫兮混埃壒而紅飛漂世波而上下兮旁窮走而相追不亦勞乎於是謝唯唯之面朋而焚逐逐之燥機餒不飽謀凍不暖謀兮環畝墻而闔扉邀仁義與之為友兮追五經而為師徜徉文章之林圃兮與百氏而驅馳不穀吾不恥穀亦吾不辭彼上章為公者豈終吾遺哉唐孫樵集第一卷
