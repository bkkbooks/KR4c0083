body:
  text: 梓潼移江記興元新路記蕭相國寫真讃梓潼移江記涪繚于郪迫城如蟠淫潦漲秋狂瀾陸高突堤嚙涯包城蕩壚歲殺州民以為官憂滎陽公始至則思所以洗民患頗聞前觀察使欲鑿江東壖地别為新江使東北注流五里復匯而東即堤墟舊江使水道與城相遠以薄江怒遂命􅐥吏發卒三千跡其前謀役興三月功不可就有謁於滎陽公曰公開新江將抉民憂然江勢不可決訛言不可絶公將何以終之滎陽公曰吾欲厚其直以勸其卒可乎對曰饑卒賴厚直民惜其田以顗得不可滎陽公曰吾欲戮其將以動其卒可乎對曰代之將者必苦吾卒卒若叛不可滎陽公曰奈何對曰夫民可與樂終難與圖始固自役興巳來彼其民曰夏王鞭促萬靈以導百川今果能攺夏王跡耶非徒無功抑有後災羣疑牽綿民心蕩搖前時觀察使欲鑿新江中輟議而罷豈病此耶公即能先堤民言新江可度日而決也滎陽公諾明日滎陽公視政加猛決獄加斷又明日杖殺左右有所二事鞭官吏有所阻政者遂下令曰開新江非我家事將脫郪民於魚禍耳民敢橫議者死郪民以滎陽公嘗為京兆既憚牽綿民心蕩搖前時觀察使欲鑿新江中輟議而罷豈病此耶公即能先堤民言新江可度日而決也滎陽公諾明日滎陽公視政加猛決獄加斷又明日杖殺左右有所二事鞭官吏有所阻政者遂下令曰開新江非我家事將脫郪民於魚禍耳民敢橫議者死郪民以滎陽公嘗為京兆既憚其猛及是民心大栗羣舌如斬未幾而新江告成滎陽公歡出臨視班賞罷卒巳而歎曰民言不堤新江其不決耶新江長步一千五百闊十分其長之二深七分其闊之一盤堤既隆舊江遂墟凡得田五百畝其年七月水果大至雖踰防稽陸不能病民其績宜何如哉滎陽公既以上聞有司劾其不先白詔奪俸錢一月之半樵嘗為褒城驛記恨所在長吏不肯出毫力以利民及覩滎陽公以開新江受譴豈立事者亦未易耶是歲開成五年也興元新路記入扶風東臯門十舉步折而南平行二十里下念濟坂下折而西行十里渡渭又十里至郿郿多美田不為中貴人所並則籍東西軍居民百一繫縣自郿南平行二十五里至臨溪驛驛扼谷口夾道居民皆籍東西軍出臨溪驛百步南登黃蜂嶺平行不能百步又步登潗潗嶺盤折而上甚峻平出潗潗嶺南可罷潗潗路自注潗嶺北並澗可為閣道下潗潗嶺嶺稍平二嶺之間凡行十里自臨溪有支路直絶澗並他放此蒲浪反山復絶澗蛇行磧上十里合于大路此路當絶自注秋夏下黃蜂嶺復有支路並澗出潗潗嶺下行亂石中五六里與澗西支路合此路亦絶自注秋夏由大路十里橋無定河河東南來觸西山下隳號怒北去河中多白石磊磊如斛又十里至松嶺驛逆旅三戶馬始食茅自松嶺平行三里逾二橋登八里坂甚峻下坂行十里平如九衢又高低行五里行連雲驛自連雲西平行二十里上五里嶺路極盤折凡行六七里及嶺上泥深滅踝苦於此可為棧自注行者多易之路以路㫄樹往往如挂塵纓纚纚而長從風紛然訊於薪者曰此泥榆也豈此嶺常泥而樹有此名乎凡泥行十里稍稍下去又平行十里則山谷四拓原隰平曠水淺草細可耕稼有居民似樊川間景氣又五里至平川驛自平川西並澗高下行十里復度嶺平行五十里出嶺西亦古道自注嶺東度澗可詣為閣路上下嶺凡五里復平不能一里復高低有閣路行七八里扼路為關關北為臨洮關南為河池自黃蜂嶺洎河池關中間百餘里皆故汾陽王私田嘗用息馬多至萬蹄今為飛龍租入地耳入關行十里皆閣路並澗閣絶有人橋蜿蜿如虹絶澗西南去橋盡路如九衢夾道植樹步步一株凡行六七里至白雲驛自白雲驛西並澗皆閣道行十里巖上有石刻橫為一行曰鄭淮造凡三字不知何等人也為准蓋視之誤自注人以淮又一十三里至芝田驛皆閣道卒高下多碎石自芝田至仙岑雖閣路皆平行往往澗㫄谷中有桑柘民多藂居雞犬相聞水益清山益奇氣候甚和自仙岑南行十三里路左有崖壁然而高出其下殷其有聲如風怒薄水里人謂之鳴崖豈石常鳴耶抑俟人而鳴耶又行十五里至二十四孔閣一十三里至芝田驛皆閣道卒高下多碎石自芝田至仙岑雖閣路皆平行往往澗㫄谷中有桑柘民多藂居雞犬相聞水益清山益奇氣候甚和自仙岑南行十三里路左有崖壁然而高出其下殷其有聲如風怒薄水里人謂之鳴崖豈石常鳴耶抑俟人而鳴耶又行十五里至二十四孔閣閣名也自注古閣上巖甚奇有石刻其刻云褒中與閣主簿王顒漢中郡道閣縣椽馬甫漢中郡北部督郵逈通都匠中郎將王胡典知二縣匠衛績教蒲池石佐張梓等百二十人匠張羌教褒中石優泉疆等百四十人閣道教習常民學川石等三人作川一本人五凡七十字其側則曰太康元年正月二十九日案其刻乃晉􅐥平吳時蓋晉由此路耳又行十五里至青松驛驛自仙岑而南路㫄人煙相望澗㫄地益平曠往往墾田至一二百畝桑柘愈多至青松即平田五六百畝谷中號為夷地居民尤多自青松西行一二里夾路多松竹稍稍深入不復有平田行五六里上小雪嶺極峻折嶺東多泥土疏而黑嶺西尤峻十里百折上下嶺凡十八里四望多叢竹又高低行十里至山輝驛居民甚少行旅無庇自山輝西高低行二十里上長松嶺極峻羊腸而上十里及嶺上復羊腸而下十五里及嶺下又高下行十里至回雪驛自回雪驛南行三里上平樂坂極盤折上下凡十五里至福溪大雪嶺平行五里上長松嶺北與自注自福溪有路並自山下由開此路都將賈昭爭功且欲折之遂開古山輝大路合蓋古所通乃坦途也禆將將路松嶺又高下行十里至黃崖崖南極峻折上下黃崖六七里至盤雲驛西行復並澗行二十里即背絶小嶺上下凡五六里稍平又行十里至雙溪驛西有路並澗出白自注自盤雲驛興元亦古所通尤坦塗也城固之要道出城西又平行三十里至城又行六十里至長開天嶺路也其縣遂略開路自雙溪南平行四里至天苞嶺羊腸而上凡十五里極峻折往往閣路至嶺上南望興元烟靄中也下嶺尤峻折凡三十里至文川驛自文川南行三十五里至靈泉驛自靈泉平行十五里至長栁店夾道居民又行十五里至興元西平行三十里至褒城縣與斜谷舊路合矣注自耳樵嘗淑中褒斜一經文川至於山川險議者多以謂此路不及褒斜此言不公耳苟使賈昭盡心于滎陽公如樵所條注易道途迹悉得條記嘗用披校蓋亦折衷斜路矣誠逾於褒孫樵曰古人尚謀新仍曰何必攺作利不十法不變豈謀新亦未易耶滎陽公為漢中以褒斜舊路修阻上疏開文川道以易之觀其上勞及將下勞及卒其勤至矣其始立心誠無異於古人將濟民於艱難也然朝廷有竊竊之議道路有唧唧之歎豈滎陽公始望耶況謀肇乎賈昭事倡乎李俅役卒督工者不增品秩於天子則加班列於滎陽公滎陽公無毫利以自與而怨咎獨歸滎陽公豈古所謂為民上者難耶蕭相國真讃咫尺天威首出時傑英眄橫溢神鋒秀發秋空健骨霜夜皎月劒淬愈利玉燒不熱錦浦宸游傅巖㝱說馭物惟誠在公抗節再安宗祏蕩掃氛孽黃道回日翠􅏞歸闕粃糠魏丙肩𬒮稷契仰止丹青永保徽烈唐孫樵集第四卷
