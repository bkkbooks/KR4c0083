  - {type: variant, offset: 6, length: 1, content: 卷, WYG: 五篇此本十巻為毛晉汲古閣所刋稱王鏊從内閣抄出近時汪師韓集有孫文志疑序一篇因謂樵文惟唐文粹所載後佛寺奏}
