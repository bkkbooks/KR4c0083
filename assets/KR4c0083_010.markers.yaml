  - {type: variant, offset: 9, length: 2, content: 夻堰, WYG: 聞禄山之逆祕而勿復知天寳之政由此而荒矣今者下無林甫遏諫之權上有開元虚巳之勞如此則叙立朝廷者皆得道上是非不顧時忌矧執事官曰諫議哉執事卒不能言避其官而逃其禄可也他官秩優而位崇者豈少耶今年三月上嘗欲營治國門執事尚諫罷之今詔營廢寺以復羣髠三年之間斤斧之聲不絶度其經費豈特國門之廣乎稽其所務豈特國門之急乎何執事在國門則知諫在復寺則緘黙勇其細而怯其大豈諫議大夫職耶樵以為大蠧生民者不過羣髠武皇帝發憤除之冀活疲甿今天下之民喘未及息國家復欲興旣除之髠以重困之将何致民之蕃冨乎樵不知時態竊所憤勇故作奏書一通以明羣髠大蠧之由生民重困之源無路上聞輒以愚獻執事倘以樵書不為狂試入為上言其畧與髙錫望書文章如面史才最難到司馬子長之地千載獨聞得揚子雲唐朝以文索士二百年間作者數十輩獨髙韓吏部吏部修順宗實録尚不能當班堅其能與子長子雲相上下乎足下乃小史尚宜世嗣史法矧足下才力雄獨意語橫闊嘗序義復岡及樂武事其說要害在樵宜一二百言者足下能數十字輒盡情狀及意窮事際反若有千百言在筆下足下齒髮未及壯其所得如此則不知子長子雲當足下年齒時文章果何如也然足下所傳史法與樵所聞者異耶古史有直事俚言者有文飾者乃特紀前人一時語以立實録非為俚言奇健能為史筆精魄故其立言序事及出沒得失皆字字典要何嘗以俚言汨其間哉今世俚言文章謂得史法因牽韓吏部曰如此如此樵不知韓吏部以此欺後學耶韓吏部亦未知史法邪又史家紀職官山川地理禮樂衣服亦宜直書一時制度使後人知某時如此某時如彼不當以秃屑淺俗則取前代名品以就簡絶夫史家條序人物宜存警訓不當徒以官大寵濃講文張字故大惡大善雖賤必紀尸生浪職雖貴得黜至如司馬遷序周繆班孟堅傳蔡義尚可用耶為史官者明不顧刑辟幽不見神怪若梗避于其間其書可燒也古者國君不得視史今朝廷以宰相監撰大丈夫當一時寵遇皆欲齊政房杜躋俗太平孰能受惡於不隱乎古者七十子不與筆削今朝廷以史館叢文士儒家擅一時胸臆皆欲各任憎愛手出白黑孰能專門立言乎樵未知唐史誠何如也樵雖承史法於師又嘗熟司馬遷揚子雲書然才韻枯梗文過乎質嘗序廬江何易于首末千言貴文則䘮質近質則太秃刮垢磨痕卒不到史獨謂足下才力天出最與史近故以樵所授於師者致足下寓汴觀察判官書大梁居東諸侯兵最為雄軍候乘權肆豪奴視州縣官州縣官即熛縮自下美言立聞觀察使徃徃得上下考即欲認官為治必為軍候所傾折大者至奪觀察使小者至為軍人所繫辱州縣官格手失職不敢與抗由是軍候得侵繩平民鞠訊授辭徃徃獄至數百不以時省以故平民益畏軍候至不知有觀察使矧州縣官耶國家設州縣官以治平民豈以屬之軍乎今京兆二十四縣半為東西軍所奪然亦不過}
