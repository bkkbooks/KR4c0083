  - {type: variant, offset: 5, length: 2, content: 罵徸, WYG: 書襄城驛刻武侯碑隂文貞公笏銘與李諫議行方書與賈秀才書孫氏西齋銘書田將軍邊事書何易于十篇為真餘一十五篇皆後人偽撰然巻帙分合古書多有未可以是定真偽且師韓别無確據但以其句字格局斷之尤不足以為定論也乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書孫可之集巻一唐孫樵撰大明宮賦孫樵齒貢士名旅見大明宮前庭仰眙俛駭隂意靈怪莫歸魄動中宵而㝱㝱彼大明宮神前有云且曰太宗皇帝繚瀛啓居廓穹起廬圜然而劃隆然而赫孰窬孰隟永求帝宅帝詔吾司其宮太宗創立大明宮後高宗増修遂移仗焉下帝謂上帝與日月終翼聖䕶艱十有六君蕩妖斬氛孰知吾勤吾當廬陵錫武天后即真天下號周廢中宗為廬陵王賜姓武氏廟祏徹主司禮博士周宗奏増武廟為七削唐廟為五吾則協二毗輔謂梁公仁傑魏公元忠也左右提䕶義甲憤徒起帝仆周五王興輦帝出東宫斬賊迎仙殿迫后歸政天后驚黙還卧明日革周復唐吾則械二黠雛謂昌宗易之也俾即其誅胡猘飽腯謂祿山也踣肌齚骨驚血濺闕仰吠白日二聖各轍大麓北挈肅宗遂即位於靈武吾則激髯孽悖節謂慶緒也俾濟逆殺翼兩傑憤烈謂汾陽王及臨淮王俾克斮滅薊梟妖狂謂朱泚也突集五堂縱啄怒吞大駕驚奔吾則勵隂刀翦其翼俾不得逃明殛三革蝕黑孰匪吾力吾見若正聲在懸諍舌在軒輟黈延諫刳襟沃善賞必正名怒必正刑當獄撤腥太宗每遇行刑謂之御諫當稼吞螟吾則入瀆革濁貞觀中河屢清入囿肉角貞觀中麟見旬澤莫漙太平十日一雨雨必以夜㪷穀視土開元中斗米五文錢吾見若姧聲在堂諛舌在㫄窒聰怫諷正斥邪寵嘉賞失節怒罰失殺奪農而徭厚征而雕吾則反耀而彗永崇總章中彗星屢見反澤而沴蕩坤而坼地有坼而復合終日不止裂乾而石天有裂而殞石然吾留帝宮中二百年昔亦日月今亦日月徃孰為設今孰為缺籍民其凋有野而蒿開元中籍戸九百萬今二百萬籍甲其虚有壘而墟開元中籍府兵三時務農一時講武寳甲總六十萬今天下兵仰給疲農而幕府多虚者也西垣何縮疋馬不牧開元中北庭拒鄰門萬三千隴西平凉天水金城四郡息馬匹至七十萬穀四十八監以使董之是時帛疋易馬壹北垣何蹙孤壘城粒言未及闋樵迎斬其舌且曰余聞宰獲其哲房杜姚宋得是赫日烈老魅跡結爾曾何伐宰獲其慝林甫敬宗得是昏蝕魅怪橫惑爾曾何力今者日白風清忠簡盈庭闔南俟霈闔北俟霽矧帝城闐闐何賴窮邊帑廩如封何賴疲農禁甲飽獰尚何用天下兵神曾何知孰愧徃時神不能對退而笑曰孫樵誰欺乎欺古乎欺今乎吁露臺遺基賦并序武皇郊天明年作望仙臺於城之南農事方殷而興土功且有麋於縣官也樵東過驪山得露臺遺基遂作賦以諷之驪橫秦原東走盤連有土如積其髙逾尺隱于修岡屹若環堂徘徊山下問于牧者對曰惟昔漢文為天下君守以恭黙民無怨慝天下大同帝駕而東經營相視兹山之址乃因其崇以興土功兹臺始基軫于帝思旣命其吏校之經費下詔曰朕以涼德君于萬國唯日兢兢如蹈春冰髙祖惠宗肇我邦圪作此宫室庻㡬無逸逮夫朕躬孰敢加隆矧麋府財以經此臺周為靈臺成乎子來文王以昇以考休徵兹臺以平周德惟馨章華雖髙楚民亦勞靈王宣驕諸侯不朝民既攜貳王遂以死豈朕不懲斯役實興鳩材嘯工以害三農斯豈文王靈臺之不日哉宜詔有司亟令罷之此其基者乎卒歌而去之且曰彼通天兮鞅埃􅅽之巍巍此靈臺兮蔽秋草之離離已而巳而世無比兮吾孰知其是非出蜀賦辛酉之直年兮引敗車而還秦濟潼梓之重江出大劎之複關駭天險之重阻兮峙連岡而外坤譎石詭崖汨其城屬兮屹紆鬱於雲昏嵌嵒嵒而查牙兮上攅羅而戞天中呀坼以隙斜兮途詰屈而隘穿以去以來奔蹄疾足兮鼠出入乎穴間蹇余馬之不息届峽山之偪側劃崇巒之怒來水涵空而混碧途迫髙而縁深不尺直而又曲跬危歩之促促慄若跣而蹈棘朝天雙峙以虧蔽中慘慄而隂翳倐下馳而上迴若出地而天開龍堂呀呀而上啓怪若虎而欲噬泉觱沸而中洌靈窸窣乎像設盼山川以懷古得籌筆於途說指前峯之孤秀傳臥龍之餘烈嘗枚師而北去抗霸圖而此决曾尺疆之不闢徒齎}
