  - {type: variant, offset: 12, length: 0, content: '', WYG: 占編民翼蔽懇田其辭獄曲直尚歸京兆今汴軍所侵州縣者反愈東西軍士大夫叢居未嘗不病東西軍侵州縣事及自提兵符則不知有以規畫之矧天子之貴耶執事三從事盧公其所以佐盧公使炳炳不磨於世者襄陽南渡之民皆能道之今居汴有日而曾無所聞豈屑屑未暇耶執事宜亟以前之所陳辨之盧公稍稍奪左右軍候權且使繫獄者不得治於軍門凡當𨽻州縣者悉索歸之使軍自軍州縣自州縣無相奪也今執事官曰判官察州縣事正執事職幸無忽與賈希逸書主數足下曩者樵耳足下聲憤足下售於時何晚及目足下五通五十篇則足下困十上亦宜矣物之精華天地所祕惜故䝉金以砂錮玉以璞珊瑚之叢必茂重溟夜光之珠必含驪龍抉而不巳櫝而不知止不窮則禍天地讎也文章亦然所取者廉其得必多取者深其身必窮六經作孔子削迹不粒矣孟子述子車坎軻齊魯矣馬遷以史記禍班固以西漢禍揚雄以法言太𤣥窮元結以浯溪碣窮陳拾遺以感遇窮王勃以宣尼廟碑窮玉川子以月蝕詩窮杜甫李白王江寧皆相望於窮者也天地其無意乎今足下立言必奇摭意必深抉精剔華期到聖人以此賈於時釣榮邀富猶欲疾其驅而方其輪若曰爵禄不動於心窮達與時上下成一家書自期不朽則非樵之所敢知也嗚乎孤進患心不苦及其苦知者何人古人抱玉而泣樵捧足下文能不濡睫懼足下自持也淺且疑其道不固因歸五通不得無言與王霖秀才書太原君足下雷賦逾千六言推之大易參之𤣥象其旨甚㣲其辭甚奇如觀駭濤於重溟徒知褫魄眙目莫得畔岸誠謂足下怪於文方舉降旗將大誇朋從間且疑子雲復生無何足下繼以翼旨及雜題十七篇則與雷賦相闊數百里足下未到其壼則非樵所敢與知既入其城設不如意亦宜上下銖兩不當如此懸隔不知足下以此見嘗耶抑以背時戾衆且欲哺粕啜醨以其苟合耶何自待則淺而徇人反深鸞鳳之音必傾聽雷霆之聲必駭心龍章虎皮是何等物日月五星是何等象儲思必深摛辭必髙道人之所不道到人之所不到趨怪走奇中病歸正以之明道則顯而微以之揚名則乆而傳前輩作者正如是譬玉川子月蝕詩楊司城華山賦韓吏部進學解馮常侍清河壁記莫不拔地倚天句句欲活讀之如赤手捕長蛇不施控騎生馬急不得暇莫不捉搦又如逺人入太興城茫然自失詎比十家縣足未及東郭目巳極西郭耶樵嘗得為文眞訣於來無擇來無擇得之於皇甫持正皇甫持正得之於韓吏部退之然樵未始與人言及文章且懼得罪於時今足下有意於此而自疑尚多其可無言乎樵再拜與友人論文書嘗與足下評古今文章似好惡不相闊者然不有所竟顧樵何所得哉古今所謂文者辭必髙然後為奇意必深然後為工煥然如日月之經天也炳然如虎豹之異犬羊也是故以之明道則顯而微以之揚名則乆而傳今天下以文進取者嵗叢試於有司不下八百輩人人矜執自大所得故其習於易者則斥澀艱之辭攻於難者則鄙平淡之言至有破句讀以為工摘俚語以為奇秦漢巳降古文所稱工而奇者莫若揚馬然吾觀其書乃與今之作者異耳豈二子所工不及今之人乎此樵所以惑也當元和長慶之間達官以文馳名者接武於朝皆開設戶牖主張後進以磨定文章故天下之文薰然歸正洎李御史甘以樂進後士飄然南遷由是達官皆闔關齚舌不敢上下後進宜其為文者得以盛任其意無所取質此誠可悲也足下才力雄健意語鏗耀至於發論尚徃往為時俗所拘豈所謂以黃金注者昏耶顧頑朴無所知曉然嘗得為文之道於來公無擇來公無擇得之皇甫公持正皇甫持正得之韓先生退之其所聞者如前所述豈樵所能臆說乎孫可之集巻二欽定四庫全書孫可之集巻三唐孫樵撰書何易于何易于嘗為益昌令縣距刺史治所四十里城嘉陵河南刺史崔朴嘗乘春自上游多從賓客歌酒泛舟東下直出益昌㫄至則索民挽舟易于即腰笏引舟上下刺史驚一有呌字問狀易于曰方春百姓不耕即蠶隙不可奪易于為屬令當其無事可以充役刺史與賓客跳出舟偕騎還去益昌民多即山樹茶利私自入㑹鹽鐡官奏重𣙜筦詔下所在不得為百姓匿易于視詔曰益昌不征茶百姓尚不可活矧厚其賦以毒民乎命吏剗去吏爭曰天子詔所在不得為百姓匿今剗去罪愈重吏止死明府公一有寧字􅊵竄海裔一無裔字耶易于曰吾寧愛一身以毒一邑民乎亦不使罪蔓爾曹即自縱火焚之觀察一作風使聞其状以易于挺身為民卒不加劾邑民死䘮子弱業破不能具葬者易于輒出俸錢使吏為辦百姓入常賦有垂白僂杖者易于必召坐食問政得失庭有競民易于皆一作輒親自與語為指白枉直罪小者勸大者杖悉立遣之不以付吏治益昌三年獄無繫民民不知役改綿州羅江令其治視益昌是時故一無故字相國裴公刺史一作出鎭綿州獨能嘉易于治嘗從觀其政道從不過三人其合一作察易于廉一有約字如是㑹昌五年樵道出益昌民有能言何易于治狀者且曰天子設上下考以勉吏而易于考止中上何哉樵曰易于督賦如何曰止請常期不欲緊一作堅繩百姓使賤出粟帛督役如何曰度支費不足遂出俸錢冀優貧民饋給徃來權勢如何曰傳符外一無所與擒盜如何曰無盜樵曰予居長安一有中十二字歲一作年聞給事中校考則曰某人為某縣得上下考由考一作某人由上下考得某官問其政則曰某人能督賦先期而畢某人能督役省度支費某人當道能得徃來達官為好言某人能擒若干盜反若干盜一無四字縣令得上下考者如此邑民不對笑去樵以為當世一有在字上位者皆知求才一作財為切至如緩急補吏則曰吾患無以共治膺命舉賢則曰吾患無以塞詔及其有之知者何人哉繼而言之使何易于不有得於生必有得於死者有史官在書田將軍邊事背臨卭南馳越二百里得嚴道郡實與沈黎越嶲俱為邊城迫一作逼下同於羣蠻田在賓將軍刺嚴道三年能條悉南蠻事為樵言曰巴蜀西迫于戎南迫于蠻宜有以制之者當廣德建中之間西戎兩飲馬於岷江其衆如蟻前鋒魁健皆擐五屬之甲持倍尋之㦸徐呼按一作接步且戰且進蜀兵遇鬭如植橫堵羅戈如林發矢如䖟皆折刅吞鏃不能斃一戎而況陷其陣乎然其戎兵踐吾地日深而疫死者日衆即自度不能留亦輒引去故蜀人為之語曰西戎尚可南蠻殘我自南康公鑿青谿道以和羣蠻俾由蜀而貢又擇羣蠻子弟叢一作聚于錦城使習書算業就輒去復以他繼如此垂五十年不絶其來則其學於蜀者不啻千百故其國人皆能習知巴蜀土風山川要害文皇帝三年南蠻果大入成都門其三門四日而旋一本無其三門四日而旋七字非其所剽掠自成都以南越嶲以北八百里之間民畜為空加以敗卒貧民持兵羣聚因緣刧殺官不能禁由是西蜀十六州至今為病自是以來羣蠻常有屠蜀之心居則息畜聚粟動則練兵講戰一作武而又俾其習於蜀者伺連帥之間隙察兵賦之虚實或聞蜀之細民苦於重征且將啓之以幸非常李丞相固言鎭西時有編民李權者遣子齎書通蠻言蜀無備可取狀邊城獲之按問得實遂棄市至今或有踵其所為者吾不知羣蠻此舉大劒以南為國家所有乎且每歲發卒以戍南者皆成都頑民飽稻飫豕十九如瓠雖知鉦鼓之數不習山川之險吾嘗伺其來朔風正嚴緩步坦途日次一舍固巳呀然汗矣而況厯重阻即嚴程束甲而趨扶㦸而鬭耶加以為將者刻薄以自入餽運者縱吏而鼠竊縣官當給帛則以苦一作疎而易良當賑粟則以砂而參粒每歲當給帛主将輒先市輕帛以易其重帛然後散諸邊卒當給糧丁吏必先盜其米然後以砂補其數以給邊卒常以為怨如此則邊卒將怨望之不暇又安能殊死而力戰乎此巴蜀所以為憂也樵曰誠如將軍言苟為國家計者孰若詔嚴道沈黎越嶲三城太守俾度其要害按其壁壘得自募卒以守之且兵籍於郡則易為役卒出於邊則習其險而又各於其部繕相美地分卒為屯春夏則耕蠶以資衣食秋冬則嚴壁以俟冦敵連帥即能督之歲遣廉白吏視其卒之有無劾其守之不法者以聞如此則縣官無餽運之費奸吏無因縁之盜兵足食給卒無胥怨於將軍何如田將軍曰如此何患言卒遂書書褒城驛壁褒城驛號天下第一及得寓目視其沼則淺混而茅一作汙視其舟則離敗而膠庭除甚蕪堂廡甚殘一作淺烏覩其所謂宏麗者訊於驛吏則曰忠穆公嘗牧梁州以褒城控三節度治所龍節虎旗馳驛犇軺以去以來轂交蹄劘由是崇侈其驛以示雄大葢當時視他驛為壯且一歲賓至者不下數百輩苟夕得其庇飢得其飽皆莫至朝去寧有顧惜心耶至如棹舟則必折篙破舷碎鷁而後止魚釣則必枯泉汨泥盡魚而後止至有飼馬於軒宿隼於堂凡所以汙敗室廬糜毁器用官小者其下雖氣猛可制官大者其下益暴橫難禁由是日益破碎不與曩類其曹八九輩雖以供饋之隟一二力治之其能補數十百人殘暴乎語未既有老甿笑於㫄且曰舉今州縣皆驛也吾聞開元中天下冨蕃號為理平踵千里者不裹糧長子孫者不知兵今者天下無金革之聲而戶口一作編氓日益破疆場無侵削之虞而墾田日益寡生民日益困財力日益竭其故何哉凡與天子共治天下者刺史縣令而巳以其耳目接於民而政令速於行也今朝廷命官既巳輕任刺史縣令而又促數於更易且刺史縣令遠者三歲一更近者一二歲再更故州縣之政苟有不利於民可以出意革去其甚者在刺史曰明日我即去何用如此在縣令亦曰明日我即去何用如此當愁醉醲當飢飽鮮一作愁當醉飢當飽囊帛櫝金笑與秩終嗚呼州縣眞驛耶矧更代之隟黠吏因緣恣為奸欺以賣州縣者乎如此而欲望生民不困財力不竭戸口不破墾田不寡難哉予既揖退老甿條其言書于褒城驛屋壁孫可之集巻三欽定四庫全書孫可之集巻四唐孫樵撰梓潼移江記涪繚于郪迫城如蟠淫潦漲秋狂瀾陸髙突堤嚙涯包城蕩壚歲殺州民以為官憂滎陽公始至則思所以洗民患頗聞前觀察使欲鑿江東壖地别為新江使東北注流五里復匯而東即堤墟舊江使水道與城相遠以薄江怒遂命武吏發卒三千跡其前謀役興三月功不可就有謁於滎陽公曰公開新江將抉民憂然江勢不可決訛言不可絶公將何以終之滎陽公曰吾欲厚其直以勸其卒可乎對曰飢卒賴厚直民惜其田以顗得不可滎陽公曰吾欲戮其将以動其卒可乎對曰代之將者必苦吾卒卒若叛不可滎陽公曰奈何對曰夫民可與樂終難與圖始故自役興已來彼其民曰夏王鞭促萬靈以導百川今果能改夏王跡耶非徒無功抑有後災羣疑牽綿民心蕩揺前時觀察使欲鑿新江中輟議而罷豈病此耶公即能先堤民言新江可度日而決也滎陽公諾明日滎陽公視政加猛決獄加斷又明日杖殺左右有所貳事鞭官吏有所阻政者遂下令曰開新江非我家事將脱郪民於魚禍耳民敢横議者死郪民以滎陽公嘗為京兆既憚其猛及是民心大慄羣舌如斬未幾而新江吿成滎陽公歡出臨視班賞罷卒巳而歎曰民言不堤新江其不決耶新江長步一千五百闊十分其長之二深七分其闊之一盤堤既隆舊江遂墟凡得田五百畝其年七月水果大至雖踰防稽陸不能病民其績宜何如哉滎陽公既以上聞有司劾其不先白詔奪俸錢一月之半樵嘗為褒城驛記恨所在長吏不肻出毫力以利民及覩滎陽公以開新江受譴豈立事者亦未易耶是歲開成五年也興元新路記入扶風東臯門十舉步折而南平行二十里下念濟坂下折而西行十里渡渭又十里至郿郿多美田不為中貴人所并則藉東西軍居民百一繫縣自郿南平行二十五里至臨溪驛驛扼谷口夾道居民皆籍東西軍出臨溪驛百步南登黃蜂嶺平行不能百步又步登潗潗嶺盤折而上甚峻潗嶺北竝磵可為閣道平出潗潗嶺南可罷潗潗路下潗潗嶺嶺稍平二嶺之間凡行十里自臨溪有支路直絶澗竝山復絶澗虵行磧上十里合于大路秋夏此路當絶下黃蜂嶺復有支路竝澗出潗潗嶺下行亂石中五六里與澗西支路合秋夏此路亦絶由大路十里橋無定河河東南來觸西山下墮號怒北去河中多白石磊磊如斛又十里至松嶺驛逆旅三戶馬始食茅自松嶺平行三里逾二橋登八里坂甚峻下坂行十里平如九衢又髙低行五里行連雲驛自連雲西平行二十里上五里嶺路極盤折凡行六七里及嶺上泥深滅踝行者多苦於此可為棧路以易之路㫄樹徃往如挂塵纓纚纚而長從風紛然訊於薪者曰此泥榆也豈此嶺常泥而樹有此名乎凡泥行十里稍稍下去又平行十里則山谷四拓原隰平曠水淺草細可耕稼有居民似樊川間景氣又五里至平川驛自平川西竝澗髙下行十里復度嶺嶺東度澗可詣為閣路平行五十里出嶺西亦古道上下嶺凡五里復平不能一里復髙低有閣路行七八里扼路為關關北為臨洮關為河池自黃蜂嶺洎河池關中間百餘里皆故汾陽王私田嘗用息馬多至萬蹄今為飛龍租入地耳入關行十里皆閣路竝澗閣絶有人橋蜿蜿如虹絶澗西南去橋盡路如九衢夾道植樹步步一株凡行六七里至白雲驛自白雲驛西竝澗皆閣道行十里巖上有石刻橫為一行曰鄭淮造凡三字不知何等人也人多以淮為准字葢視之誤又一十三里至芝田驛皆閣道卒髙下多碎石自芝田至仙岑雖閣路皆平行往往澗㫄谷中有桑柘民多藂居雞犬相聞水益清山益奇氣候甚和自仙岑南行十三里路左有崖壁然而髙出其下殷其有聲如風怒薄水里人謂之鳴崖豈石常鳴耶抑俟人而鳴耶又行十五里至二十四孔閣古閣名也閣上巖甚奇有石刻其刻云褒中與閣主簿王顒漢中郡道閣縣椽馬甫漢中郡北部督郵逈通都匠中郎将王胡典知二縣匠衛績教蒲池石佐張梓等百二十人匠張羌教褒中石佐泉疆等百四十人閣道教習常民學川石等三人一本作川五人凡七十字其側則曰太康元年正月二十九日案其刻乃晉武平呉時葢晉由此路耳又行十五里至青松驛驛自仙岑而南路㫄人烟相望澗㫄地益平曠往往墾田至一二百畝桑柘愈多至青松即平田五六百畝谷中號為夷地居民尤多自青松西行一二里夾路多松竹稍稍深入不復有平田行五六里上小雪嶺極峻折嶺東多泥土疎而黒嶺西尤峻十里百折上下嶺凡十八里四望多叢竹又髙低行十里至山輝驛居民甚少行旅無庇自山輝西髙低行二十里上長松嶺極峻羊腸而上十里及嶺上復羊腸而下十五里及嶺下又髙下行十里至迴雪驛自迴雪驛南行三里上下樂坂極盤折上下凡十五里至福溪自福溪有路竝自山下由大雪嶺平行五里上長松嶺北與山輝大路合葢古所通乃坦途也禆将将開此路都将賈昭爭功且欲折之遂開古松嶺路又髙下行十里至黃崖崖南極峻折上下黃崖六七里至盤雲驛西行復竝澗行二十里即背絶小嶺上下凡五六里稍平又行十里至雙溪驛自盤雲驛西有路竝澗出白城西又平行三十里至城又行六十里至興元亦古所通尤坦途也城固之要道出其縣遂略開路長開天嶺路也自雙溪南平行四里至天苞嶺羊腸而上凡十五里極峻折往往閣路至嶺上南望興元烟靄中也下嶺尤峻折凡三十里至文川驛自文川南行三十五里至靈泉驛自靈泉平行十五里至長栁店夾道居民又行十五里至興元西平行三十里至褒城縣與斜谷舊路合矣議者多以謂此路不及褒斜此言不公耳樵嘗淑中褒斜一經文川至於山川險易道途迹悉得條記嘗用披挍葢亦折𠂻耳苟使賈昭盡心于滎陽公如樵所條注誠逾於褒斜路孫樵曰古人尚謀新仍曰何必改作利不十法不變豈謀新亦未易耶滎陽公為漢中以褒斜舊路修阻上疏開文川道以易之觀其上勞及将下勞及卒其勤至矣其始立心誠無意於古人将濟民於艱難也然朝廷有竊竊之議道路有喞喞之歎豈滎陽公始望耶况謀肇乎賈昭事倡乎李俅役卒督工者不増品秩於天子則加班列於滎陽公滎陽公無毫利以自與而怨咎獨歸滎陽公豈古所謂為民上者難耶蕭相國眞讃咫尺天威首出時傑英盼横溢神鋒秀發秋空健骨霜夜皎月劎淬愈利玉燒不熱錦浦宸游傳巖夢説馭物惟誠在公抗節再安宗祏蕩掃氛孽黃道囘日翠華歸闕粃糠魏丙肩袂稷契仰止丹青永保徽烈孫可之集巻四欽定四庫全書孫可之集巻五唐孫樵撰孫氏西齋録孫樵謂陸長源唐春秋乃編年雜録因掇其體一作絜切峭獨可以示懲勸者擲其叢冗秃屑不足以警訓者自為十八通書號孫氏西齋録起髙祖之初洎武皇之終首廟號以表元首日月以表事尚功力正刑名登崇善良蕩戮凶囘有所鯁避則㣲文示譏無所顧慄則直書志慝所謂髙祖殺太子建成者何黜功循愛譏失教也太宗有大功宜嗣有天下髙祖不當立建成為太子至有六月二十四日事故書髙祖殺建成李勣立皇后武氏者何忘諫賛慝懲廢命也李勣為顧命大臣儻堅諫不奪髙宗不敢立武氏為后故書李勣立皇后武氏起王后已廢之魂上配天皇者何登嫌黜冢不可謂順予懼後世疑於禘祼也髙宗廢王后立武后乃貞觀侍女何以列昭穆故時以王后配髙宗示天后有嫌於禘祼矣條天后擅政之年下繫中宗者何紫色閠位不可謂正予懼後世牽以稱臨也天后改元即真今悉以天后年號及行事繫于中宗示女子不得改元者政也崔察賊殺中書令裴炎名犯武宗廟諱者何詭諛梯亂肇殺機也裴為顧命大臣屢白天后歸政御史崔察廷詰裴曰若不有異謀何故白太后歸政天后遂發怒斬裴于都亭驛故書曰崔察賊殺中書令裴張守珪以安禄山叛者何貸刑怫教稔禍階也祿山乃張守珪部将嘗犯令張曲江令守珪案之守珪不從卒使亂天下故書張守珪以安禄山叛他皆倣此稱天下殺者何罪暴天下示衆與殺也稱天子殺者何死非其罪示衆不與殺也臣或不書卒者何不以直終去卒以示貶也君或不書葬者何不以正終去葬以示譏也懼怠云瑞示戒志沴尚德必書賤尸位則黜貴皆所以敺邪合正俾歸大義則前所謂起王后配天皇條天后年號行事繫于中宗之類是也操實寘例以示懲勸前所謂李勣立皇后武氏張守珪以禄山叛之類是也嗚呼宰相升沈人於十數年間史官出没人於千百歲後是史官與宰相分挈死生權也為史官者不能忭直骨於枯墳臠諂魄於下泉磨毫黷扎叢閣飽帙豈國家任史官意耶樵既序其略授其友髙錫望傳之矣武皇遺劎録武皇帝得利劍於希夷之間提攜六年而四用之宜其庻績暉如哉往者北戎猖狂渝盟盜壃大出虜門戍卒屢奔武皇赫然奮雷霆之威驅貔武之師靖邊塵於塞垣復帝子於敵庭非武皇一用其劎耶賊鎭阻兵邀爵山東刼衆以濟其奸擘險以扞其誅王師萃之屢戰無功兵衂将稽賊勢益張并醜乘之遂萌梟心乃刼吾兵乃固吾城反書既聞卒愕京師輿人謡曰上宜亟以節假之且赦其辜俾守北門以伐敵謀不然并且東連潞兵北合戎師分卒以趨太行巻甲以下河東國家其能甘心於潞冦耶武皇曾不逗撓於其𠂻亟發武符按言誅之羽檄朝馳夕擒并頑非武皇再用其劎耶并部既平潞守益堅王師吿勞國用吿虚内外咨嗟訛言沸騰飛言上聞上為不聞誅潞之心益牢責戰之詔日􅃊卒能克大憝於山東梟渠魁於國門非武皇帝三用其劎耶浮屠之流其來綿綿根盤蔓滋日熾而昌蠱於民心蠶於民生力屈財殫民恬不知武皇始議除之女泣于閨男號于途廷臣辨之於朝䙝臣爭之於㫄羣疑膠牢萬口一辭武皇曾不待疑卒詔有司驅羣髠而髮之毁其居而田之其徒既㣲其教僅存民瘼其瘳國用有加風雨以時災沴不生非武皇四用其劎耶今者嗣皇帝纂武皇之耿光傳武皇之遺劎宜乎銛其鍔不使其挫寳其刃不使其泥而又硎之以義淬之以智匣之以禮苞之以仁持之以信與天下終始天下幸甚龍多山録梓潼南鄙越五百里其中有山崛起中天即山之趾得逕委延舉武三十北出其巔氣象鮮妍孕成隂烟屹石巉巉别為東巗槎牙重複爭先角逐若絶若裂若缺若穴突者虎怒企者猿踞横者木仆挺者碑植又有似乎飛簷連軒􅟝櫨交攅欹撑兀柱懸棟危礎殊狀詭類愕不得視下有畝平砥若戶庭攄乳側脉膏停泓石俯對絶壑鈔臨蘭薄仙臺摽異藂石負起屹與山别猿鳥磧絶腹竇而空路由其中齗齶相望攀縁上下闖然而出曜見白日始時永嘉飛眞葢羅人傳晉永嘉中有為葢羅者於北臺上學道焉葢羅於此白日上升今臺下有碑誌存焉者也去蹤斯存石刻傳聞丹成而蛻駕鶴騰天一去遼廓千載寂寞澄泉傳靈别壑絶明風閒境清寂寥無聲嘉木美竹岡巒交植風來怒黒雷動崖谷山禽嵓獸捷翔牙驚曉吟暝啼聽之悽悽迴環下矚萬類在目洇山帶川青縈碧聨莽蒼際天杳杳不分月上于東日薄于泉魄朗輪昏出入目前其或宿霧朝雲糊空縛山漠漠漫漫莫知其端陽曜始浴徹天昏紅輪髙而赤洪流散射濃透薄釋綿裂綺折千状萬態倐然收霽樵起耒而遊泊車而休登降信㝛聞見習熟始曰山乎曾未始有得乎無處夸世釣名者汚此巖扃乎且欲聞於潁陽之徒乎孫可之集巻五欽定四庫全書孫可之集巻六唐孫樵撰迎春奏黑帝厯窮帝命青帝嗣其公以其無私皇帝備牲牢鼔鐘迎饗于郊東賤臣樵寓疏太常上奏曰天有四時陛下實行之是天乘陛下政令明昏而為燠寒也青帝何功而饗乎寛空春之日陛下廩以時出帛以時䘏則蘖芽弩拔勾萌畢達矣夏之日陛下農事無所奪山麓無所伐則草木壯茁國無夭札矣秋之日陛下獄無曲次畋無圍殺則霜露不失節萬物固結矣冬之日陛下地氣不掘洩室屋不徹發則豐隆不敢繫越百蟄塞穴矣聖人之時日南無驕陽啓蟄無繁霜斗北無伏隂火西無滯霖淫昏之世反膏而波春行秋令大水廢民廬舍反冰而花冬行夏令能李花雹傷螟齧夏行冬令則雨雹時則蝗飛蔽天旱赤雨血秋行夏令則雨血時則赤旱千里是陛下政令出乎修明則寒暑運行政令出乎淫昏則災祥屢臻其可忽乎臣又聞陛下與人為春得革慘作和起枿生華喜滿其家沃穆歡咳如暖景時開樹色烟光覺葱蘢芳蒼陛下與人為秋得愁刮人魄風日冷白慄慄蕭索覺庭槐枯落陛下與人為夏得變絺成襦嘘燼作爐駒驅轍結雜遝噎禊門如三伏熱陛下與人為冬得舉皆不見日涷薄人骨間間慼慼燈青火白門無蹄轍跡顧陛下左右皆春天下病悴者衆也陛下肘腋皆熱中國病凍者衆也豈陛下用心有頗焉陛下苟能平其心雖澤不周惠不均天下無恨言不然天将視陛下心而燠寒也復佛寺奏賤臣樵上言臣以為殘蠧於理者羣髠最大且十口之家謂中戶也男力而耕女力而桑卒歲其衣食僅自給也棟宇僅自完也若羣髠者所飽必稻粱所衣必綿縠居則邃宇出則肥馬是則中戶不十不足以活一髠武皇帝元年籍天下羣髠者凡十七萬夫以十家給一髠是編民百七十萬困於羣髠矣武皇帝一旦髮天下髠悉歸平民是時一百七十萬家之心咸知生地陛下自卽位以來詔營廢寺以復羣髠自元年正月卽位以來洎今年五月斤斧之聲不絶天下而工未巳訊聞陛下卽復之不休臣恐數年之間天下十七萬髠如故矣臣以為武皇帝卽不能除羣髠陛下尚宜勉思而去之以甦疲民況将興於巳廢乎請以開元之事明之開元之年大駕還自東封從以千官之衆六軍之士三日留於陳留民猶有餘力今陛下即能東封道次給一食則民力殫矣何開元之民力有餘而陛下之民力不足耶開元之間率戶出兵索若干戸共出若干兵也籍而為伍春夏縱之家以力耕稼秋冬聚之将以戒武事如此則兵未始廢於農農未嘗奪於兵故開元之民力有餘也今天下常兵不下百萬皆衣食於平民歲度費率中戸五僅能活一兵如此則編戶不五百萬不足以給之故陛下之民力不足也今陛下以力不足之民而欲重困於羣髠将何以踵開元太平事耶貞觀以還開元戶口最為殷繁不能逾九百萬卽今有問於戶部其能如開元乎借如陛下以五百萬給天下之兵今欲又以一百七十萬給於羣髠是六百七十萬無羡賦矣即令戶口不下於開元其餘止二百萬而國家萬故畢出其間陛下孰與其足耶卽是鹽鐡不可除而𣙜筦加算矣天下之民得不重困乎日者陛下嘗欲營國東門諫議大夫入爭於前一言未及終陛下非徒輟其工而又賜帛以優之今所復寺宇豈特國門之急乎叢徒嘯工豈特國門之使乎寧諫議大夫不以言而陛下不以聽耶陛下則不能復廢之臣願陛下巳復之髠止而勿復加巳營之寺止而勿復修庻幾天下之民尚可活也今天下最不可去者兵也尚為陛下日夜思去兵之術究開元太平事冀異日為陛下言之況去無用之髠耶臣昧死以言孫可之集巻六欽定四庫全書孫可之集巻七唐孫樵撰序西南夷道齊之東偏泛鉅海不知其幾千里其島夷之大者曰新羅由蜀而南逾昆明涉不毛馳七八千里其羣蠻之雄者曰南詔是皆鳥獸之民鴂舌言語難辨皮服獷悍難化其素風也唐宅有天下二國之民率以儒為教先彬彬然與諸夏肖矣其新羅大姓士有觀藝上國科舉射策與國士偕鳴者載籍之傳蔑然前聞夫其生窮海之中託瘴野之外徒知便弓馬校戰獵而巳烏識所謂文儒者哉今抉獸心而知禮節褫左衽而同衣服非皇風遠洽耶嘗聞化之所被雖草木頑石飛走異彚咸知懷德於是乎有殊能詭形之効祉者二國之為其瑞與夫瑞之出不孤将必有類者則庾朔之隅不懷之倫其嚮風仰流歸吾化哉世之言唐瑞者徒曰肉角格六德稼天酒泫庭苑巢神禽樵則曰二國文學也序陳生舉進士夫物不得以時而發其發必熾風時溪谷飀飀習習卽不得遂作必飄忽源泉混混然堤防陂蓄波決壅缺亦不可遏於其人也亦然潁川陳君學積乎勤藝髙乎專䘮家途歉志用不通鬱然而居者有年矣累為連帥賓禮貢之天子齎咨喑嗚輒以窮盡今年稍始克偕計吏僶勉上道久憤湮鬱一旦決發若風波之得宣洩吁可當耶名光耀乎天庭聲飛馳乎海浦其在此行矣然君子學道以循禄端巳以售道不肯尺枉以蘄尋直況突梯滑稽以苟得與君其勉之樵弱弓蓬矢難以妄彀徒羡君之引滿强勁指期命中於行不能無述寓居對長安寓居闔戸諷書悴如涷灰癯如槁柴志枮氣索怳怳不樂一旦有曾識面者排戶入室咤駭唧唧且曰憊耶餓耶何自殘耶則對曰樵天付窮骨宜安守拙無何提筆入貢士列抉文倒魄讀書爛舌十試澤宫十黜有司知巳日懈朋徒分離矧遠來關東槖裝鎖空一入長安十年屢窮長日猛赤餓腸火迫滿眼花黑晡西方食莫雪嚴洌入夜斷骨穴衾敗褐到曉方活古人取文其責葢輕一篇跳出至死馳名今人取文章章貴奇一句戾意巻前知解言念每歲徂春背暑洗剔精魂澄拓襟慮曉窗夜燭上下雕斵摭言必髙儲思必深字字磨校以牢知音況榮辱撓其外得失戕其内機穽在乎足鋒刃在乎背吾非檻豕籠雛其能窮而反諛乎客退遂書几為歌曰肥於貌孰與肥其道求於人孰與求其身處乎出乎孰為得而孰為失乎乞巧對孟秋莫天當庭布筵有瓜於盤有果於盆拜而言若祈於神者從而問之對曰七夕祈巧祀也若有求乎樵應之曰吾守吾拙以全吾節巧如可求適為吾羞彼巧在言便便翻翻出口簧然媚於人間革白成黑蠱直殘德譽跖為聖譛囘為賊離間君親賣亂家國彼巧在文摘奇搴新轄字束句稽程合度磨韻調聲決濁流清雕枝鏤英花鬭窠明至有破經碎史稽古倒置大類於俳觀者啓齒下醨沈謝上殘騷雅取媚於時古風不歸彼巧在官竊譽假善齚舌鉗口媚竈賂權忍恥受侮愧畏如鼠望塵掃門指期九遷君納於達贊唱菲菲翫世偷安敗俗紊官彼巧在工壞詭不窮唾古笑朴雕鎪錯落憑雲亘天㬦霍延綿窮侈殫麗越禮踰制繡紋錦幅雲綃霧縠若出鬼力大蠧婦織遂使俗尚浮華名溺于奢凋家磨國未騁胸臆蠱于化源戕此民力由此觀之巧何足云吾寳吾拙雖與事闊優游經史臥雲嘯月九衢喧喧夾路朱門曉鼓一發車馳馬犇予方髙枕偃然就寢腹揺鼻息夢到鄉國槐花撲庭鳴蜩噪晴懷軸囊刺門門買聲方予屏居詠歌吾廬對松欹石莫知其餘上天付性吾豈無命何求於巧以撓吾靜吾方欲上叫帝閽以窒巧門使天下人各歸其根無慮無思其樂怡怡耕食織衣如上古時巧乎巧乎将何所施為孫可之集巻七欽定四庫全書孫可之集巻八唐孫樵撰文貞公笏銘大中六年詔出文貞公笏歸其孫丞相謩孫樵請銘其笏曰靈豸廌角比干獻骨合此憤烈在公為笏怒虎可唾笏不可挫太華可裂笏不可折拄天不仄指日不蝕摽儀條臆起梗開直噫諫舌切上磨帝缺不逆不怫笏則公笏𦂳拱折列諍舌不發膠榮顧餗下偷上愎非公之節孰為公笏潼關甲銘并序潼戶呀東翼廉敞南有𤣥甲數十扎焉委于前楹澀塵飄風綴斷革刓樵過而誚之且曰此國之閫也是小欲遏冦偷大欲扼諸侯今者關禁弛而不譏守甲存而不完将何抑天下心而割天子憂耶關吏笑而進曰借如潼之甲可以燭日潼之旗可以絳天戰鞞晝驚驚柝夜鳴吾曹将擺堅荷鍛投死地之不暇又安得與客合繻而東合繻而西哉今上君臨萬邦號令所加風清日明理為大和如此則關之禁何為而申嚴關之甲何為而繕堅𤣥宗四十二年關中之兵其屯如雲遠敵西來叱而闢之守甲其不完耶古之善守天下者展禮以防之闡樂以和之明刑以齊之修政以固之則其守在四海之外何以關為而況完其甲乎是天下愈安而其禁愈弛天下愈平而其甲愈弊耳樵將去之且銘其甲云潼關之甲完吾孰與安潼關之甲弊吾孰與濟甲乎甲乎理與爾謀亂與爾謀無俾工爾修唐故倉部郎中康公墓誌銘并序唐尚書倉部郎中姓康氏以咸通十三年月日薨於鄭州官舍其年月日前左拾遺陳畫寓書孫樵曰與子俱恩康公門今先遠有期其孤徵誌於子子其無讓樵哭之慟巳而揮涕敘平生公諱某字某㑹稽人曾祖諱某贈某官祖諱某贈某官父諱某贈某官公㓜嗜書及冠能屬詞尤工四六文章援毫立成清媚新峭學者無能如自宣城來長安三舉進士登上第是歲㑹昌元年也其年冬得博學宏詞授秘書省正字明年臨桂元公以觀風支使來辟換試祕書郎五年調再授祕書省校書郎大中二年復調授京兆府參軍其年冬為進士試官峭獨不顧雖權勢莫能撓其與選者不踰年繼踵昇第故中書侍郎髙公璩尚書倉部郎中崔亞前左拾遺陳畫洎樵十軰皆出其等列也明年授大理評事兼監察御史戶部廵官明年改鹽廵官天付介直不能諂言故丞相河東公休使鹽鐵轉運公或請計事将入門裴公謂謁者曰必康君也裴公始以直知終以直廢明年去鹽鐵詔授大理司直或有所讞宰相莫能迴其筆明年授賜大理司議郎兼侍御史度支廵官明年改授檢校戶部員外郎兼侍御史轉運推官明年換判官今華州刺史李公訥拜鹽鐵轉運使将涖事且召羣吏曰二十年巳旋推官判官誰為廉平可以助吾治者羣吏皆以公塞問李公曰吾得之矣公由是不去職咸通元年改檢校禮部郎中兼侍御史充轉運判官李公始以廉平知終以章奏加厚常稱於班行間曰康公宜掌帝制或與宰相言必慰薦之明年詔授海州刺史廉而不刻明而不抉案牘符檄公一以口授之羣胥軰徒搦管捉紙字字書出蓄縮汗慄何暇為奸犯耶以故老吏猾胥畏之如神明秩罷退居淮隂咸通八年詔拜大理少卿明年遷尚書倉部郎中充西川宣諭制置鹽法使兼西川供軍使賜紫金魚袋公馳驛至西川不浹旬而鹽無二價蜀甿至今賴之㑹西川節度使劉公以疾薨戍兵日至軍儲不給糗無常價而度支有定估遂乘傳詣門且請與度支計事無何詔以竇滂代公公遂守倉部郎中㑹竇滂逗遛不以時之任朝廷欲以警之其年十一月遂貶公為醴州刺史明年移鄭州長史朝廷或有繁難之任議莫不以公為言宰相且将用之嗚呼天殲正人誠疲民之不幸非公之不幸也公娶長樂馮氏故給事中累贈太尉諱審第三女也公十二男八女長曰齊鄉貢進士次曰顔鄉貢進士次曰言明經及第次曰某某云長女適鹽州防禦判官試大理評事髙遲七女未筓夫人自京師攜其孤犇䘮於管城某年九月三日以公之䘮權窆于孟州河隂縣某鄉里銘曰㑹稽之英斗牛之靈併鍾德門公實挺生月中搴桂日下馳名芸閣清秩牢盆美聲出牧東海貳卿棘寺鵷行望郎錦川星使騏驥蹀足蛟龍得水富貴可期烟霄漸邇謫非其罪天道寧論不復雙闕遽歸九泉圃田發紖河隂封樹勒石載銘庻幾終古刻武侯碑隂赤帝子火熾四百年天厭其熱洎獻燼矣武侯獨發憤不顧收死灰於蜀欲嘘而再燃之艱乎為力哉是以四稱武岐雍間地不尺闊抑非智不周天意炳炳然也夫以武侯之賢寧靡籌其不可也葢激備隆中天下託不欲曲肱安穀終兒女子手將驅馳死備志耶由是覈武侯之所為殆庻幾矣然跨西南一隅與呉魏抗國提卒數萬綽綽乎去留無我枝者是亦善為兵矣史壽以為短應變眞抑武侯哉俾武侯不早入地曹之君臣将犇走固圉之不暇鍾鄧寕能越巖懸兵決勝指取耶是井絡之野與武侯存亡俱矣天殲武侯其不愛劉愈明白其姜維何力焉曩蟠南陽時人不與仲毅伍洎受社稷寄擅刑賞柄曾心不愧畏人不疑黷何意氣明信卓卓也武侯死五百載迄今梁漢之民歌道遺烈廟而祭者如在其愛於民如此而久也獨謂武侯之治比於燕奭彼屠齊城合諸侯在下矣舜城碑帝承天休纂堯之勲啓宫于蒲守不以城帝守以城孰守不城阻湖為池限華為門波非不狂巖非不崇守不以仁社為周遷将蒙監扶理土朔方萬里扞邊貽謀子孫始訖其功阿房已墟帝豈不城城在民和自華洎夷罔不順同屹為國垣以藩有虞其堅如金其厚如坤蕩蕩巍巍牢不可屠四罪雖頑莫敢來攻一家熙熙相視而安帝配商均不私以城帝死蒼梧授之夏家太甲不修帝城乃頽厥唯帝城哲王獨知求之民心迺見其基帝城雖隳築之不難無寧無荒帝城復髙不識不知相傳峻隅其板雖崇其築難堅非帝之心孰為帝城孫可之集巻八欽定四庫全書孫可之集巻九唐孫樵撰逐痁鬼文孫子病痁其友踵門請曰始則慄縮撼懷有若仆子於嚴冰者終則憤胸爍肌有若寘子於烈爐者子知動作皆鬼耶余試為子逐之以文樵應之曰予病誠鬼也然樵居平亦有不自了事者抑有鬼乎樵嘗思委質以事君則有若刳心而死者立於㫄曰當如此諫樵嘗思不入於危難則有若結纓而死者立於㫄曰當如此忠樵嘗欲不固其窮則有若拜拒饋粟者立於㫄曰當如此廉樵嘗欲苟違其期則有若擁梁汨死者立於㫄曰當如此信樵嘗欲與人美言則有若教予訐談而鯁人耳者樵嘗欲與人市交則有若教予違熱而去勢者樵嘗欲趨權豪以冀得則有若牽予裾而躓予足者樵嘗欲忍汗􅎼以自媒則有若縛予舌而膠予口者予之不得專也如此以故學勤而吾道愈窮業修而知己日消是殘吾生於痁鬼也子并為我逐之吾聞有陳萬年者射利乘機邇顔作怡愉愉便便阿意奉歡死而有靈是為諂鬼此鬼依人使人䝉福人見輒喜擺去不得復有公孫𢎞者尅已沽名飾情釣聲内苞禍心外示舒𢎞死而有知是為嬌鬼此鬼憑人使人有聞上信於君下喜於民復有司馬安者攘義盜仁縛舌交唇柔聲婉顏狐媚當權死而有靈是為巧鬼此鬼依人辭枯即榮長劎華纓髙步天庭復有和長輿者鉅萬藏家貫腐鏹磨鱗差螭縮陣陣腥澀死而有知是為錢鬼此鬼憑人使人氣豪意適交歡販禄買曲成直此四鬼者苟與吾遊吾必快所求是資吾生於他鬼也子并為我招之其友不對退而歌曰窮吾知其所羞達吾知其所求此不當逐而彼不當游君乎君乎誠有激於中乎吁祭髙諫議文咸通十一年十一月五日友人孫樵謹遣家僮犀角雁兒具時羞之奠敬祭於故友滁州刺史贈諫議大夫髙公叶卜之靈嗚呼與君定友不謝古人為分日牢為道日親二十五年彼我一身人謂我愚君謂我賢人欲我後君欲我先我為一善君喜見顔我為一失君慍形言意我尚華布衣御寒樵常意在華飾故友為樵常葢布被用以示儉素意我苟進蓑笠當軒樵常汲汲於進取故友為樵懸蓑笠於前軒以示髙尚我蟠濁泥君躡青雲不以升沈壍隔其間誨我如兄煦我如春我何敢忘銘骨書紳君之文章可動鬼神君之器業可活生民我之賴君如倚華山庻寡吾過期大吾門君牧滁甿我從邠軍方恨綿􅊬凶訃遽聞東嚮慟哭痛貫心肝三日麻衣朝晡忘飡百身莫贖何裨往魂嗚呼痛哉杵臼死義比干死仁君殞賊手為怨難論嗚呼痛哉君殯喬谷我歸咸秦試發舊篋君書盈千詞旨重重墨色如新苟非相諫即是慰安塡臆悲來淚如迸泉嗚呼哀哉天䘮吾友吾何望焉誰拯湮溺孰開頑昏嗚呼痛哉世人結交違寒集温如我不易如君固難嗚呼痛哉敬姜晝哭嵇紹幸存輤車其東歸骨洛川遠備醪饌告辭柩前嗚呼哀哉尚饗祭梓潼神君文大中十八年七月九日鄉貢進士孫樵再拜獻辭張君靈座之前樵實頑民不知鬼神凡過祠廟不笑即唾今於張君信有靈云㑹昌五年夜躋此山凍雨如泣滑不可陟滿眼漆黑索途不得跛馬慍僕前仆後踣樵因有言非燭莫前須臾有光來馬足間北望空山火起廟壖焰焰逾丈飛芒射天暝色斜透峻途如晝樵謂廟奴苦寒爇薪取溫曉及山顚鏁澀廟門餘燼莫覩孰知其然大中四年冐暑還秦午及山足猛雨如雹樵復有言神誠能神反雨為晴曩火乃靈斯言纔闋迴風大發始自馬前怒號滿山劈雲飄雨使四山去兹山巍巍輕塵如飛訖四十里雨不霑衣顧樵當時嘉神不欺與神心期神其自知今過祠宇其敢黙去觴酒豆脯捧拜庭下神其歆此孫可之集巻九欽定四庫全書孫可之集巻十唐孫樵撰}
