  - {type: variant, offset: 8, length: 0, content: '', WYG: 而灰滅越百牢而南指憩石門之委䆳六隂崖而戸開屹巍巍以皚皚外攅怪石之參差兮勢嶪峩而上排狀若鬱雲之始騰又似乎潮波之却頽中䆗窱以窙豁敞曭朗而洞達摧嵓泉之瀯瀯鏘環珮於閨闥躡危石而後通忽泱漭而無窮包溪懷壑而為深兮繚巒岡而四崇蘿薜羃厯於嵓穴兮雲木森其青葱鬱桂椒與木蘭兮芬淑郁而駭風曾不可以乆留兮車軋軋而又東陟雞幘之蹇㠊下七折之峻坂褒斜吁其隘束兮左窮溪兮右重巘綿飛棧而屬危梁兮續畏途而呀斷下臨千􅌇之驚流兮波澒洞而雷抃當𤣥冬之隆烈觸宻雪之飛噴舞迴颷而颺九垠天地紛其漫漫路縈積以迷􅃿馬蕭蕭而不進心悸悸而程不敢逸兮徒憭慄而興歎出大散之奥區若脫足於囚拘涉汧渭之沄沄厯岐雍之通途田原鬱以澶漫兮彌千里而為都背槐里而趨咸陽兮索嬴劉之舊墟承明冀關緬以夷漫兮得隱嶙之顔隅獨五陵之尚完兀髙平而草蕪抵長都之岌岌排閶闔而西入荷天衢之廣關仰白日之赫赫彀弱弓而滿鈆鏃兮即澤宫而睨的夫何號貢之缺條兮忽有司之吾斥曾不得而上通兮居悒悒而不適闕庭藹其多士兮皆云夫賢索不自分其能否兮瞰朱門之投蹟蔑一人之我先若捧水而投石念初心之來斯豈窮愁而徒疑忽徊徊以惶惶蹇東西而獨悲因黙黙以心計兮私展轉而自非胡不知進之與道謀兮徒盛氣而憤時不知求已以為慮兮而患人之不知九衢廣其茫茫兮混埃􅅽而紅飛漂世波而上下兮旁窮走而相追不亦勞乎於是謝唯唯之面朋而焚逐逐之燥機餒不飽謀凍不煖謀兮環畮牆而闔扉邀仁義與之為友兮追五經而為師徜徉文章之林圃兮與百氏而驅馳不穀吾不恥穀亦吾不辭彼上章為公者豈終吾遺哉孫可之集巻一欽定四庫全書孫可之集巻二唐孫樵撰與李諫議行方書樵嘗為日蝕書以為國家設諫官期換君心之非不以一咈其言而怠於諫即繼以死非其職耶執事居其官亦嘗有意於此乎開元之間豈待諫官而後言耶苟立天子廷者皆開口奮舌爭於上前故自貞觀以還開元之政最為修明及林甫舞智以固權張詐以聾上於是膠羣僚之口縛諫官之舌且以法中敢言者由是林甫之惡熾而勿}
