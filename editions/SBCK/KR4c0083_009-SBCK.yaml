  text: 唐孫樵集第九卷
  hash: sha256:92929d8c296ef095c6dd79b24547786d239ac0b1a33f01ecd0008cd524f38379
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0083_SBCK_009-1a}
body:
  text: 逐痁鬼文祭故友高諫議文祭梓潼神君文逐痁鬼文孫子病痁其友踵門請曰始則慄縮撼懷有若仆子於嚴氷者終則憤胷爍肌有若寘子於烈爐者子知動作皆鬼耶余試爲子逐之以文樵應之曰予病誠鬼也然樵居平亦有不自了事者抑有鬼乎樵嘗思委質以事君則有若刳心而死者立於㫄曰當如此諫樵嘗思不入於危難則有若結纓而死者立於其㫄曰當如此忠樵嘗欲不固其窮則有若拜拒饋粟者立於㫄曰當如此廉樵嘗欲苟違其期則有若擁梁汨死者立於㫄曰當如此信樵嘗欲與人美言則有若教予訐談而鯁人耳者樵嘗欲與人市交則有若教予違熱而去勢者樵嘗欲趨權豪以冀得則有若牽予􅅂而躓予足者樵嘗欲忍汗赧以自媒則有若縛予舌而膠予口者予之不得專也如此以故學勤而吾道愈窮業修而知巳日消是殘吾生於痁鬼也子幷爲我逐之吾聞有陳萬年者射利乘機邇顔作怡愉愉便便阿意奉歡死而有靈是爲謟鬼此鬼依人使人蒙福人見輒喜擺去不得復有公孫弘者尅巳沽名餙情釣聲內苞禍心外示舒弘死而有知是爲嬌鬼此鬼憑人使人有聞上信於君下喜於民復有司馬安者攘義盜仁縛舌交脣柔聲婉顏狐媚當權死而有靈是爲巧鬼此鬼依人辭枯即榮長劒􅏞纓高歩天庭復有和長輿者鉅萬藏家貫腐鏹磨鱗差螭縮陣陣腥澁死而有知是爲錢鬼此鬼慿人使人氣豪意適交歡販禄買曲成􅀡此四鬼者苟與吾遊吾必快所求是資吾生於他鬼也子幷爲我招之其友不對退而歌曰窮吾知其所羞逹吾知其所求此不當逐而彼不當游君乎君乎誠有激於中乎吁祭高諫議文咸通十一年十一月五日友人孫樵謹遣家僮犀角鴈兒具時羞之奠敬祭于故友滁州剌史贈諫議大夫高公叶卜之靈嗚呼與君定友不謝古人爲分日牢爲道日親二十五年彼我一身人謂我愚君謂我賢人欲我後君欲我先我爲一善君喜見顔我爲一失君慍形言意我尚華布衣御寒爲樵常葢布被用以示儉素自註樵常意在華餙故友意我苟進簔笠當軒爲樵懸蓑笠於前軒以示高尚自註樵常汲汲於進取故友我蟠濁泥君躡青雲不以升沉塹隔其間誨我如兄煦我如春我何敢忘銘骨書紳君之文章可動鬼神君之器業可活生民我之頼君如倚華山庻寡吾過期大吾門君牧滁甿我從邠軍方恨綿􅊬凶計遽聞東嚮慟哭痛貫心肝三日麻衣朝脯忘餐百身莫贖何禆往魂嗚呼痛哉杵臼死義比干死仁君殞賊手爲怨難論嗚呼痛哉君殯喬谷我歸咸秦試發舊篋君書盈千詞㫖重重墨色如新苟非相諫卽是慰安塡臆悲來淚如迸泉嗚呼哀哉天䘮吾友吾何望焉誰拯湮溺孰開頑昏嗚呼痛哉世人結交違寒集温如我不易如君固難嗚呼痛哉敬姜晝哭嵇紹幸存輤車其東歸骨洛川遠僃饌告辭柩前嗚呼哀哉尚饗祭梓潼神君文大中十八年七月九日鄉貢進士孫樵再拜獻辭張君靈座之前樵實頑民不知鬼神凡過祠廟不笑即唾今於張君信有靈云㑹昌五年衣躋此山涷雨如泣滑不可陟滿眼漆黑索途不得跛馬慍僕前仆後踣樵因有言非燭莫前須􅁷有光來馬足間北望空山火起廟壖熖熖逾丈飛芒射天􅊕色斜透峻途如晝樵謂廟奴苦寒爇薪取温曉及山顚鏁澁廟門餘燼莫覩孰知其然大中四年冐暑還秦午及山足猛雨如雹樵復有言神誠能神反雨爲晴曩火乃靈斯言纔闋廻風大發始自馬前怒號滿山劈雲飄雨使四山去兹山巍巍輕塵如飛訖四十里雨不霑衣顧樵當時嘉神不欺與神心期神其自知今過祠宇其敢黙去觴酒豆脯捧拜庭下神其歆此唐孫樵集第九卷
