front:
  text: 唐孫樵集第五卷
  hash: sha256:d674dca8420cdf9e127213acbbfdb6e2e1d2302bfaeb5d67ecadcdd5f07bc225
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0083_SBCK_005-1a}
body:
  text: 孫氏西齋録􅐥皇遣剱錄龍多山錄孫氏西齋錄孫樵謂陸長源唐春秋乃編年雜録因掇其體絜一作切峭獨可以示懲勸者擲其叢冗秃屑不足以警訓者自爲十八通書號孫氏西齋錄起高祖之初洎􅐥皇之終首廟號以表元首日月以表事尚功力正刑名登崇善良蕩戮凶回有所鯁避則微文示譏無所顧慄則􅀡書志慝所謂高祖殺太子建成者何黜功循愛譏失教也太自註為太子至有六月二十四日事故書高祖宗有大功宜嗣有天下高祖不當立建成成殺建李勣立皇后􅐥氏者何忘諫賛慝懲廢命也不奪高宗不敢立􅐥氏爲后故書自註李勣爲顧命大臣儻堅諫后􅐥氏李勣立皇起王后巳廢之魂上配天皇者何登嫌黜􅃁不可謂順予懼後世疑於禘祼也侍女何以列昭穆故時以王后配高自註高宗廢王后立􅐥后乃貞觀嫌於禘祼矣宗示天后有條天后擅政之年下繫中宗者何紫色閠位不可謂正予懼後世牽以稱臨也后年號及行事繫于中宗示女子自註天后攺元卽眞今悉以天者政也不得攺元崔察賊殺中書令裴炎犯􅐥宗廟自註名諱者何詭䛕梯亂肇殺機也顧命大臣屢自註裴爲異謀何故白太后歸政天后遂發怒斬裵白天后歸政御史崔察廷詰裵曰若不有察賊殺中書令裴于都亭驛故書曰崔張守珪以安禄山叛者何貸刑怫教稔禍階也張守珪部将嘗自註祿山乃亂天下故書張守珪以安禄山叛他皆倣犯令張曲江令守珪案之守珪不從卒使此稱天下殺者何罪㬥天下示衆與殺也稱天子殺者何罪非其罪示衆不與殺也臣或不書卒者何不以􅀡終去卒以示貶也君或不書葬者何不以正終去葬以示譏也懼怠云瑞示戒志沴尚德必書賤尸位則黜貴皆所以􅇌邪合正俾歸大義註自后年號行事繫于中宗之類是也按前所謂起王后配天皇條天操實寘例以示懲勸武氏張守珪以禄山叛之類自註前所謂李勣立皇后也是嗚呼宰相升沉人於十數年間史官出没人於千百歲後是史官與宰相分挈死生權也爲史官者不能忭􅀡骨於枯墳臠諂魄於下泉磨毫黷扎叢閣飽帙豈國家任史官意耶樵既序其略授其友高錫望傳之矣􅐥皇遺劒録􅐥皇帝得利劒於希夷之間提攜六年而四用之宜其庶績暉如哉徃者北戎猖狂渝盟盜壃大出虜門戍卒屢奔􅐥皇赫然奮雷霆之威驅貔􅐥之師靖胡塵於塞垣復帝子於虜庭非􅐥皇一用其劒耶賊鎭阻兵邀爵山東刼衆以濟其奸擘險以扞其誅王師萃之屢戰無功兵衂將稽賊勢益張幷醜乘之遂萌梟心乃刧吾兵乃固吾城反書旣聞卒愕京師輿人謡曰上宜亟以節假之且赦其辜俾守北門以伐虜謀不然幷且東連潞兵北合戎師分卒以趨太行巻甲以下河東國家其能甘心於潞寇耶􅐥皇曽不逗撓於其􅂨亟發􅐥符按言誅之羽檄朝馳夕擒幷頑非􅐥皇再用其劒耶幷部既平潞守益堅王師吿勞國用吿虚內外咨嗟訛言沸騰飛言上聞上爲不聞誅潞之心益牢責戰之詔日嚴卒能克大憝於山東梟渠魁於國門非􅐥皇帝三用其劒耶浮屠之流其來綿綿根盤蔓滋日熾而昌蠱于民心蠶于民生力屈財殫民恬不知􅐥皇始議除之女泣于閨男號于途廷臣辨之于朝䙝臣爭之于㫄羣疑膠牢萬口一辭􅐥皇曽不待疑卒詔有司驅羣髠而髮之毁其居而田之其徒既微其教僅存民瘼其瘳國用有加風雨以時災沴不生非􅐥皇四用其劎耶今者嗣皇帝纂􅐥皇之耿光傳􅐥皇之遺劒宜乎銛其鍔不使其挫寳其刃不使其泥而又硎之以義淬之以智匣之以禮苞之以仁持之以信與天下終始天下幸甚龍多山録梓潼南鄙越五百里其中有山崛起中天卽山之趾得逕委延舉􅐥三十北出其巔氣象鮮妍孕成陰烟屹石巉巉别爲東巖槎牙重􅃨爭先角逐若絶若裂若鈌若穴突者虎怒企者猿踞横者木仆挺者碑植又有佀乎飛簷連軒􅟝櫨交攢欹撑兀柱懸棟危礎殊狀詭􅀋愕不得視下有畞平砥若戸庭攄乳側脉膏停泓石俯對絶壑杪鈔一作臨蘭薄仙臺標異藂石負起屹與山别猿鳥磧絶腹竇而空路由其中齗齶相望攀縁上下闖然而出曜見白日始時永嘉飛眞葢羅為葢羅者於北臺上學道自註人傳晉永嘉中有臺下有碑誌存焉者也焉葢羅於此白日上升今玄蹤斯存石刻傳聞丹成而蛻駕鶴騰天一去遼廓千載寂寞澄泉傳靈别壑絶明風閒境淸寂寥無聲嘉木美竹岡巒交植風來怒黑雷動崖谷山禽嵓獸捷翔牙驚曉吟暝啼聽之悽悽廻環下矚萬類在目洇山帶川青縈碧聨莽蒼際天杳杳不分月上于東日薄于泉魄朗輪昏出入目前其或宿霧朝雲糊空縛山漠漠漫漫莫知其端陽曜始浴徹天昏紅輪高而赤洪流散射濃透薄釋綿裂綺折千狀萬態倐然收霽樵起耒而遊泊車而休登降信宿聞見習熟始曰由乎曽未始有得乎無處夸世釣名者汚此巖扃乎且欲聞於潁陽之徒乎乙丑春吳馡攷訂鋟於石香館唐孫樵集第五卷
