front:
  text: 唐孫樵集第十卷
  hash: sha256:73efb74f8ac6c47cf3f91575207bf3532e59c8ea069ad512d54122ec6624bb59
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0083_SBCK_010-1a}
body:
  text: 讀開元雜報罵徸志復夻堰籍讀開元雜報樵曩於襄漢間得數十幅書繫日條事不立首末其畧曰某日皇帝親耕耤田行九推禮某日百寮行大射禮於安福樓南某日安北諸蕃君長請扈從封禪某日皇帝自東封還賞賜有差某日宣政門宰相與百寮廷爭十刻罷如此凡數十百條樵當時未知何等書徒以爲朝廷近所行事有自長安來者出其書示之則曰吾君長安中新天子嗣國及窮虜自潰則見行南郊禮安有耤田事乎况九推非天子禮耶又嘗入太學見叢甓負土而起若堂皇者就視得石刻乃射堂舊址則射禮廢巳久矣國家安能行大射禮耶自關巳東水不敗田則旱敗苗百姓常入賦不足至有賣子爲豪家役者吾嘗背􅏞􅋅洛遇西戍還兵千人縣給一食力屈不支國家安能東封從官禁兵安能仰給耶北虜驚嚙邊甿勢不可控宰相馳出責戰尚未報功况西關復驚於西戎安有扈從事耶􅐥皇帝以御史竊議宰相事望嶺南􅋅者四人至今卿士齚舌相戒况宰相陳奏於仗乎安有廷奏諍事耶語未及終有知書者自外來曰此皆開元政事葢當時條布於外者樵後得開元録驗之條條可復云然尚以爲前朝所行不當盡爲墜典及來長安日見條報朝廷事者徒曰今日除某官明日授某官今日幸于某明日畋于某誠不􅀋數十幅書樵恨生不爲太平男子如覩開元中事如奮臂出其間因取其書帛而漫志其末凡補缺文者十三正訛文者十一是歲大中五年也罵僮志孫樵既黜於有司忽怳乎若病酲之未醒茫洋若癡人之暝行據床隱几懣然不寐二僮以樵尚甘於眠偶語戸間且曰吾聞他舉進士者有門吏諸生爲之前焉有親戚知舊爲之地焉􅋅徤僕囊大軸肥馬四馳門門求知所至之家入去如歸閽者迎屈引主人出取卷開讀喜歎入骨自某至某如到一戸口口附和不敢指破親朋扳聨聲光爛然其於名達進取如掇今主遠來關東居長安中進無所歸居無所依忿割口食以就卷軸冐暑觸雪攜出籍謁所至之門當關迎嗔俛眉與語授巻而去望一字到主人目且不可得矧其開口以延乎時或不棄而遇主人推心於公是者當開緘引讀苟合心曲又曰彼何人耶彼何自耶况所爲幽拙大與時闊凡爲世人宛顔巧脣望風趨塵以售其身則必淡面鈍口戅揖癡歩昧於知機買嫌於時凡爲讀書東獵西漁粗知首尾則爲有餘則必燈前月下寒朝暑夜磨礱反覆期入聖域徒苦其神孰禆其身凡爲文章拈新摘芳鼓勢求知取媚一時則必擺落尖新期到古人上規時政下逹民病句句淡澀讀不可入徒乖於衆孰適於用凡爲造謁去冷附􅀬大求其力小求其得則必擁門掃跡寂寞是適所至之處雀羅在戸人皆嫌去愈恭好慕凡爲結交搜羅英豪相醉以酒相飫以庖則必屑去溫燠膠牢淡泊時或藂處凍冷徹曙晨起散去潔腹出戸迨慕以故學獵今古不爲衆譽文近於奇不爲人知九試澤宫九黜有司十年輦下與窮爲期一歲之間幾日晨炊饑不飽菜寒無襲衣此皆自掇何怨於時浪死無成孰與歸耕言始及是樵聞起喜二僮遽匿呼諭不得遂敲几而歌曰彼以其勢我專吾勤彼以其力我勤其學學之不修骨肉如讐學之苟修四海何讎噫吾之所貴僮之所薄吾之所惡僮之所樂僮何知吾豈獨無時復召堰籍㑹昌元年漢波逾堤陸􅋅漂民襄陽以渚於是天子曰戸部侍郎盧某前爲廣州治稱廉平家無餘儲府有羨財耕夫無所徭舶賈無所征蠢蠢海隅頼之而安其以襄陽之殘民屬治之盧公既來襄陽始用李從事胤之畫能成新堤卽問可以爲治狀對曰天子以襄陽饑甿寄活於公宜有以休養之者襄陽之屬城爲唐州唐州之支邑爲泌陽泌之東有二流􅋅出斷堤嚙道而西沠于二流南别爲溝壤高岸頽水不得行昔召信臣嘗爲南陽能爲民障水泉廣溉灌世賴其利俗用蕃富嘗披地圖北盡南陽故地豈古所謂召堰者耶代邈時移功不加修堤割于流浸洩爲波自泌陽以南平民以西居民甚逋墾田甚凋公則能復信臣舊規眞民十世利者盧公立召管田部將出卒與􅂖率以聽命李從事卽爲條分程度指畫經畧且使跡其故堤以鯁二渠鑿其枯溝折爲南流水門既陳百瀆脉分蔓蔓于原枝枝于屯數百里間野無隟田旱無稿苗召堰旣成秋田大登八州之民咸忘其饑范陽盧庠能道李從事佐盧公事且曰盧公自南海主襄陽再以李從事參畫軍事凡其所居鏗耀有聞及爲潞州聲光削然發戍兵甲興而譁盧公駭咤謂他從事曰使李從事從我寧及此耶是時李從事䧟於讒言獲譴當奪權自盧公黜畱樂陽如此則李從事佐前盧公宜如何哉李從事去襄陽五年召堰之利益大於民嵗增良田頓至四萬樵惜李從事之跡不爲人知作復召堰籍乙丑春吳馡攷訂鋟於石香館唐孫樵集第十卷
