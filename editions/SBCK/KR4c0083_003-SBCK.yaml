  text: 唐孫樵集第三卷
  hash: sha256:8be4b8315c63c80c9c36d6f09aba850bfbd65158b9614d0da59326a3d32e5b6a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0083_SBCK_003-1a}
body:
  text: 書何易于書田將軍邊事書褒城驛壁書何易于何易于嘗爲益昌令縣距剌史治所四十里城嘉陵河南剌史崔朴嘗乘春自上游多從賓客歌酒泛舟東下􅀡出益昌旁至則索民挽舟易于卽腰笏引舟上下剌史驚呌字一下有問狀易于曰方春百姓不耕卽蠶隙不可奪易于爲屬令當其無事可以充役剌史與賓客跳出舟偕騎還去益昌民多卽山樹茶利私自入㑹鹽鐡官奏重􅅦筦詔下所在不得爲百姓匿易于視詔曰益昌不征茶百姓尚不可活矧厚其賦以毒民乎命吏剗去吏爭曰天子詔所在不得爲百姓匿今剗去罪愈重吏止死明府公寧字一下有􅊵竄海裔耶易于曰吾寧愛顧一作一身以毒一邑民乎亦不使罪蔓爾曹即自縱火焚之觀察作風文粹使聞其狀以易于挺身爲民卒不加劾邑民死喪子弱業破不能具葬者易于輒出俸錢使吏爲辦百姓入常賦有垂白僂杖者易于必召坐有與字一本下食問政得失庭有競民易于皆作輒文粹親自與語爲指白枉􅀡罪小者勸大者杖悉立遣之不以付吏治益昌三年獄無繫民民不知役攺綿州羅江令其故一作治視益昌是時故故字一無相國裵公剌史粹文二字作出鎭綿州獨能嘉易于治嘗從觀其政道導一作從不過三人其全察一作易于廉如是廉約如此一本作易于㑹昌五年樵道過道一作出益昌民有能言而易于治狀者且曰天子設上下考以勉吏而易于考止中上何哉樵曰易于督賦如何曰上止一作請常亦作緊一作貸期不欲緊堅一作繩百姓使賤賦一作出粟帛督役如何曰度支費不足遂出俸錢冀優貧民饋給徃來權􅀔如何曰傳符外一無所與擒盜如何曰無盜樵曰予居長安歲年一作聞給事中校考則曰某人爲某縣得上下考由考由上下考一作某人得某官問其政則曰某人能督賦先期而畢某人能督役省度支費某人當道能得往來逹官爲好言某人能擒若干盜反若干盜四字一無上縣令得上下考者如此邑民不對笑去樵以爲當世在字一下有上位者皆知求才財字一作爲切至如緩急補吏則曰吾患無以共治膺命舉賢則曰吾患無以塞詔及其有之知者何人哉繼而言之使何易于不有得於生必有得死者有史官在書田將軍邊事背臨卭南馳越二百里得嚴道郡實與沉黎越巂俱爲邊城迫逼一作於羣蠻田在賓將軍剌嚴道三年能條悉南蠻事爲樵言曰巴蜀西迫逼一作于戎南迫逼一作于蠻宜有以制之者當廣德建中之之字一本無間西戎兩飲馬於岷江其衆如蟻前鋒魁徤皆擐五屬之甲持倍尋之㦸徐呼按作接文粹步且戰且進蜀兵兵字一無遇鬭如值橫堵羅戈如林發矢如蝱皆折刃吞失一作鏃不能斃一戎而況䧟其陣乎然其戎兵踐吾地日深而疫死日衆即自度不能留亦輒引去故蜀人爲之語曰西戎尚可南蠻殘我自南康公鑿青谿道以和羣蠻俾由蜀而貢又擇羣蠻子弟叢聚一作于錦城使習書筭業就輒去復以他繼如此垂五十年不絶其來則其學於蜀者不啻千百故其國人皆能習知巴蜀土風山川要害文皇帝三年南巢果能大入成都門其三門四日而旋粹削其三門三字不成語文􅁐可證大人成都是一句門其三門是一句文其所剽掠自成都以南越嶲以北八百里之間民畜爲空加以敗卒貧民持兵羣聚因緣刼殺官不能禁由是西蜀十六州至今爲病自是以來羣蠻常有屠蜀之心居則息畜聚粟動則練兵講戰武一作而又俾其習於蜀者伺連帥之間隙察兵賦之虚實或聞蜀之細民苦於重征且將啓之以幸非常民李權者遣子齎書通蠻言蜀無自註李丞相固言鎭西時有編遂棄市至今或有踵其所爲者備可取狀邊城獲之按問得實吾不知羣蠻此舉大劒以南爲國家所有乎且每歲發卒以戍南者皆成都頑民飽稻飫豕十九如瓠雖知鉦皷之數不習山川之險吾嘗伺其來朔風正嚴緩歩坦途日次一舍固巳呀然汗矣而況歷重阻即嚴程朿甲而趨扶㦸而鬭耶加以爲將者刻薄以自入餽運餫一作者縱吏而以一作䑕竊縣官當給帛則以苦作踈文粹而易良當賑粟則以砂而參粒輕帛以易其重帛然後散諸邊卒自註每歲當給帛主將輒先市砂補其數以給邊卒常以爲怨當給糧丁吏必先盜其米然後以如此則邊卒將怨望之不暇又安能得一作殊死而力戰乎此巴蜀所以爲憂也樵曰誠如將軍言苟爲國家計者孰若詔嚴道沈黎越嶲三城太守俾度其要害按其壁壘得自募卒以守之且兵籍於郡則易爲役卒出於邊則習其險而又各於其部繕相美地分卒爲屯春夏則耕蠶以資衣食秋冬則嚴壁以俟冦虜連帥卽能督之歲遣廉白吏視其卒之有無劾其守之不法者以聞如此則縣官無餽運之費奸吏無因縁之盜兵足食給卒無胥胥字一無怨於將軍何如如之何一作則田將軍曰如此何患言卒遂書書褒城驛壁褒城驛號天下第一及得寓目視其沼則淺混而汙芧一作視其舟則離敗而膠庭除甚蕪堂廡甚殘淺一作烏覩其所謂宏麗者訊於驛吏則曰忠穆公嘗牧梁州以褒城控三作二文粹節度治所龍節虎旗馳驛奔軺以去以來轂交蹄劘由是崇侈其驛以示雄大蓋當時視他驛爲壯且一歲賓至者不下數百輩苟夕得其庇饑得其飽皆暮至朝去有者字文􅁐下寧有顧惜心耶至如棹舟則必折篙破舷碎鷁而後止魚釣則必枯泉汨泥盡魚而後止至有飼馬於軒宿隼於堂凡所以汙敗室廬糜毁器用官小者其下雖氣猛可制官大者其下益㬥橫難禁由是日益破碎不與曩類其某集作曹八九軰雖以供饋之隟作葺文􅁐一二力力三字無一二治之其能補數十百人殘㬥乎語未既有老甿笑於㫄且曰舉今州縣皆驛作役文粹也吾聞開元中天下冨蕃號爲理平踵千里者不裹糧長子孫者不知兵今者天下無金革之聲而戸口編戸文􅁐作日益破壃場無侵削之虞而墾田日益寡生民日益困財力日益竭其故何哉凡與天子共治作理文􅁐天下者剌史縣令而已以其耳目接於民而政令速於行也今朝廷命官既巳輕任剌史縣令而又促數於更易且剌史縣史遠者三歲一更近者一二歲再更故州縣之政苟有不利於民可以出意革去其甚者者二字文􅁐無甚在剌史曰我明日卽去何用如此在縣令亦曰明日我卽去何用如此當愁醉醲當饑飽鮮醉饑當飽文􅁐作愁當囊帛櫝作匱文􅁐金笑與秩終嗚呼州縣眞驛作其文􅁐耶矧更代之隙黠吏因緣恣爲奸欺以賣州縣者乎如此而欲望生民不困財力不竭戸口不破墾田不寡難哉予既揖退老甿條其言書于褒城驛屋壁乙丑春吳馡攷訂鋟於石香館唐孫樵集第三卷
