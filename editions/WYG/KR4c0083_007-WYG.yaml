body:
  text: 序西南夷道齊之東偏泛鉅海不知其幾千里其島夷之大者曰新羅由蜀而南逾昆明涉不毛馳七八千里其羣蠻之雄者曰南詔是皆鳥獸之民鴂舌言語難辨皮服獷悍難化其素風也唐宅有天下二國之民率以儒為教先彬彬然與諸夏肖矣其新羅大姓士有觀藝上國科舉射策與國士偕鳴者載籍之傳蔑然前聞夫其生窮海之中託瘴野之外徒知便弓馬校戰獵而巳烏識所謂文儒者哉今抉獸心而知禮節褫左衽而同衣服非皇風遠洽耶嘗聞化之所被雖草木頑石飛走異彚咸知懷德於是乎有殊能詭形之効祉者二國之為其瑞與夫瑞之出不孤将必有類者則庾朔之隅不懷之倫其嚮風仰流歸吾化哉世之言唐瑞者徒曰肉角格六德稼天酒泫庭苑巢神禽樵則曰二國文學也序陳生舉進士夫物不得以時而發其發必熾風時溪谷飀飀習習卽不得遂作必飄忽源泉混混然堤防陂蓄波決壅缺亦不可遏於其人也亦然潁川陳君學積乎勤藝髙乎專䘮家途歉志用不通鬱然而居者有年矣累為連帥賓禮貢之天子齎咨喑嗚輒以窮盡今年稍始克偕計吏僶勉上道久憤湮鬱一旦決發若風波之得宣洩吁可當耶名光耀乎天庭聲飛馳乎海浦其在此行矣然君子學道以循禄端巳以售道不肯尺枉以蘄尋直況突梯滑稽以苟得與君其勉之樵弱弓蓬矢難以妄彀徒羡君之引滿强勁指期命中於行不能無述寓居對長安寓居闔戸諷書悴如涷灰癯如槁柴志枮氣索怳怳不樂一旦有曾識面者排戶入室咤駭唧唧且曰憊耶餓耶何自殘耶則對曰樵天付窮骨宜安守拙無何提筆入貢士列抉文倒魄讀書爛舌十試澤宫十黜有司知巳日懈朋徒分離矧遠來關東槖裝鎖空一入長安十年屢窮長日猛赤餓腸火迫滿眼花黑晡西方食莫雪嚴洌入夜斷骨穴衾敗褐到曉方活古人取文其責葢輕一篇跳出至死馳名今人取文章章貴奇一句戾意巻前知解言念每歲徂春背暑洗剔精魂澄拓襟慮曉窗夜燭上下雕斵摭言必髙儲思必深字字磨校以牢知音況榮辱撓其外得失戕其内機穽在乎足鋒刃在乎背吾非檻豕籠雛其能窮而反諛乎客退遂書几為歌曰肥於貌孰與肥其道求於人孰與求其身處乎出乎孰為得而孰為失乎乞巧對孟秋莫天當庭布筵有瓜於盤有果於盆拜而言若祈於神者從而問之對曰七夕祈巧祀也若有求乎樵應之曰吾守吾拙以全吾節巧如可求適為吾羞彼巧在言便便翻翻出口簧然媚於人間革白成黑蠱直殘德譽跖為聖譛囘為賊離間君親賣亂家國彼巧在文摘奇搴新轄字束句稽程合度磨韻調聲決濁流清雕枝鏤英花鬭窠明至有破經碎史稽古倒置大類於俳觀者啓齒下醨沈謝上殘騷雅取媚於時古風不歸彼巧在官竊譽假善齚舌鉗口媚竈賂權忍恥受侮愧畏如鼠望塵掃門指期九遷君納於達贊唱菲菲翫世偷安敗俗紊官彼巧在工壞詭不窮唾古笑朴雕鎪錯落憑雲亘天㬦霍延綿窮侈殫麗越禮踰制繡紋錦幅雲綃霧縠若出鬼力大蠧婦織遂使俗尚浮華名溺于奢凋家磨國未騁胸臆蠱于化源戕此民力由此觀之巧何足云吾寳吾拙雖與事闊優游經史臥雲嘯月九衢喧喧夾路朱門曉鼓一發車馳馬犇予方髙枕偃然就寢腹揺鼻息夢到鄉國槐花撲庭鳴蜩噪晴懷軸囊刺門門買聲方予屏居詠歌吾廬對松欹石莫知其餘上天付性吾豈無命何求於巧以撓吾靜吾方欲上叫帝閽以窒巧門使天下人各歸其根無慮無思其樂怡怡耕食織衣如上古時巧乎巧乎将何所施為孫可之集巻七欽定四庫全書孫可之集巻八唐孫樵撰
