body:
  text: 與李諫議行方書樵嘗為日蝕書以為國家設諫官期換君心之非不以一咈其言而怠於諫即繼以死非其職耶執事居其官亦嘗有意於此乎開元之間豈待諫官而後言耶苟立天子廷者皆開口奮舌爭於上前故自貞觀以還開元之政最為修明及林甫舞智以固權張詐以聾上於是膠羣僚之口縛諫官之舌且以法中敢言者由是林甫之惡熾而勿復聞禄山之逆祕而勿復知天寳之政由此而荒矣今者下無林甫遏諫之權上有開元虚巳之勞如此則叙立朝廷者皆得道上是非不顧時忌矧執事官曰諫議哉執事卒不能言避其官而逃其禄可也他官秩優而位崇者豈少耶今年三月上嘗欲營治國門執事尚諫罷之今詔營廢寺以復羣髠三年之間斤斧之聲不絶度其經費豈特國門之廣乎稽其所務豈特國門之急乎何執事在國門則知諫在復寺則緘黙勇其細而怯其大豈諫議大夫職耶樵以為大蠧生民者不過羣髠武皇帝發憤除之冀活疲甿今天下之民喘未及息國家復欲興旣除之髠以重困之将何致民之蕃冨乎樵不知時態竊所憤勇故作奏書一通以明羣髠大蠧之由生民重困之源無路上聞輒以愚獻執事倘以樵書不為狂試入為上言其畧與髙錫望書文章如面史才最難到司馬子長之地千載獨聞得揚子雲唐朝以文索士二百年間作者數十輩獨髙韓吏部吏部修順宗實録尚不能當班堅其能與子長子雲相上下乎足下乃小史尚宜世嗣史法矧足下才力雄獨意語橫闊嘗序義復岡及樂武事其說要害在樵宜一二百言者足下能數十字輒盡情狀及意窮事際反若有千百言在筆下足下齒髮未及壯其所得如此則不知子長子雲當足下年齒時文章果何如也然足下所傳史法與樵所聞者異耶古史有直事俚言者有文飾者乃特紀前人一時語以立實録非為俚言奇健能為史筆精魄故其立言序事及出沒得失皆字字典要何嘗以俚言汨其間哉今世俚言文章謂得史法因牽韓吏部曰如此如此樵不知韓吏部以此欺後學耶韓吏部亦未知史法邪又史家紀職官山川地理禮樂衣服亦宜直書一時制度使後人知某時如此某時如彼不當以秃屑淺俗則取前代名品以就簡絶夫史家條序人物宜存警訓不當徒以官大寵濃講文張字故大惡大善雖賤必紀尸生浪職雖貴得黜至如司馬遷序周繆班孟堅傳蔡義尚可用耶為史官者明不顧刑辟幽不見神怪若梗避于其間其書可燒也古者國君不得視史今朝廷以宰相監撰大丈夫當一時寵遇皆欲齊政房杜躋俗太平孰能受惡於不隱乎古者七十子不與筆削今朝廷以史館叢文士儒家擅一時胸臆皆欲各任憎愛手出白黑孰能專門立言乎樵未知唐史誠何如也樵雖承史法於師又嘗熟司馬遷揚子雲書然才韻枯梗文過乎質嘗序廬江何易于首末千言貴文則䘮質近質則太秃刮垢磨痕卒不到史獨謂足下才力天出最與史近故以樵所授於師者致足下寓汴觀察判官書大梁居東諸侯兵最為雄軍候乘權肆豪奴視州縣官州縣官即熛縮自下美言立聞觀察使徃徃得上下考即欲認官為治必為軍候所傾折大者至奪觀察使小者至為軍人所繫辱州縣官格手失職不敢與抗由是軍候得侵繩平民鞠訊授辭徃徃獄至數百不以時省以故平民益畏軍候至不知有觀察使矧州縣官耶國家設州縣官以治平民豈以屬之軍乎今京兆二十四縣半為東西軍所奪然亦不過籍占編民翼蔽懇田其辭獄曲直尚歸京兆今汴軍所侵州縣者反愈東西軍士大夫叢居未嘗不病東西軍侵州縣事及自提兵符則不知有以規畫之矧天子之貴耶執事三從事盧公其所以佐盧公使炳炳不磨於世者襄陽南渡之民皆能道之今居汴有日而曾無所聞豈屑屑未暇耶執事宜亟以前之所陳辨之盧公稍稍奪左右軍候權且使繫獄者不得治於軍門凡當𨽻州縣者悉索歸之使軍自軍州縣自州縣無相奪也今執事官曰判官察州縣事正執事職幸無忽與賈希逸書主數足下曩者樵耳足下聲憤足下售於時何晚及目足下五通五十篇則足下困十上亦宜矣物之精華天地所祕惜故䝉金以砂錮玉以璞珊瑚之叢必茂重溟夜光之珠必含驪龍抉而不巳櫝而不知止不窮則禍天地讎也文章亦然所取者廉其得必多取者深其身必窮六經作孔子削迹不粒矣孟子述子車坎軻齊魯矣馬遷以史記禍班固以西漢禍揚雄以法言太𤣥窮元結以浯溪碣窮陳拾遺以感遇窮王勃以宣尼廟碑窮玉川子以月蝕詩窮杜甫李白王江寧皆相望於窮者也天地其無意乎今足下立言必奇摭意必深抉精剔華期到聖人以此賈於時釣榮邀富猶欲疾其驅而方其輪若曰爵禄不動於心窮達與時上下成一家書自期不朽則非樵之所敢知也嗚乎孤進患心不苦及其苦知者何人古人抱玉而泣樵捧足下文能不濡睫懼足下自持也淺且疑其道不固因歸五通不得無言與王霖秀才書太原君足下雷賦逾千六言推之大易參之𤣥象其旨甚㣲其辭甚奇如觀駭濤於重溟徒知褫魄眙目莫得畔岸誠謂足下怪於文方舉降旗將大誇朋從間且疑子雲復生無何足下繼以翼旨及雜題十七篇則與雷賦相闊數百里足下未到其壼則非樵所敢與知既入其城設不如意亦宜上下銖兩不當如此懸隔不知足下以此見嘗耶抑以背時戾衆且欲哺粕啜醨以其苟合耶何自待則淺而徇人反深鸞鳳之音必傾聽雷霆之聲必駭心龍章虎皮是何等物日月五星是何等象儲思必深摛辭必髙道人之所不道到人之所不到趨怪走奇中病歸正以之明道則顯而微以之揚名則乆而傳前輩作者正如是譬玉川子月蝕詩楊司城華山賦韓吏部進學解馮常侍清河壁記莫不拔地倚天句句欲活讀之如赤手捕長蛇不施控騎生馬急不得暇莫不捉搦又如逺人入太興城茫然自失詎比十家縣足未及東郭目巳極西郭耶樵嘗得為文眞訣於來無擇來無擇得之於皇甫持正皇甫持正得之於韓吏部退之然樵未始與人言及文章且懼得罪於時今足下有意於此而自疑尚多其可無言乎樵再拜與友人論文書嘗與足下評古今文章似好惡不相闊者然不有所竟顧樵何所得哉古今所謂文者辭必髙然後為奇意必深然後為工煥然如日月之經天也炳然如虎豹之異犬羊也是故以之明道則顯而微以之揚名則乆而傳今天下以文進取者嵗叢試於有司不下八百輩人人矜執自大所得故其習於易者則斥澀艱之辭攻於難者則鄙平淡之言至有破句讀以為工摘俚語以為奇秦漢巳降古文所稱工而奇者莫若揚馬然吾觀其書乃與今之作者異耳豈二子所工不及今之人乎此樵所以惑也當元和長慶之間達官以文馳名者接武於朝皆開設戶牖主張後進以磨定文章故天下之文薰然歸正洎李御史甘以樂進後士飄然南遷由是達官皆闔關齚舌不敢上下後進宜其為文者得以盛任其意無所取質此誠可悲也足下才力雄健意語鏗耀至於發論尚徃往為時俗所拘豈所謂以黃金注者昏耶顧頑朴無所知曉然嘗得為文之道於來公無擇來公無擇得之皇甫公持正皇甫持正得之韓先生退之其所聞者如前所述豈樵所能臆說乎孫可之集巻二
