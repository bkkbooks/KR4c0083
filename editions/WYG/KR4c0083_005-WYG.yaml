body:
  text: 孫氏西齋録孫樵謂陸長源唐春秋乃編年雜録因掇其體一作絜切峭獨可以示懲勸者擲其叢冗秃屑不足以警訓者自為十八通書號孫氏西齋録起髙祖之初洎武皇之終首廟號以表元首日月以表事尚功力正刑名登崇善良蕩戮凶囘有所鯁避則㣲文示譏無所顧慄則直書志慝所謂髙祖殺太子建成者何黜功循愛譏失教也太宗有大功宜嗣有天下髙祖不當立建成為太子至有六月二十四日事故書髙祖殺建成李勣立皇后武氏者何忘諫賛慝懲廢命也李勣為顧命大臣儻堅諫不奪髙宗不敢立武氏為后故書李勣立皇后武氏起王后已廢之魂上配天皇者何登嫌黜冢不可謂順予懼後世疑於禘祼也髙宗廢王后立武后乃貞觀侍女何以列昭穆故時以王后配髙宗示天后有嫌於禘祼矣條天后擅政之年下繫中宗者何紫色閠位不可謂正予懼後世牽以稱臨也天后改元即真今悉以天后年號及行事繫于中宗示女子不得改元者政也崔察賊殺中書令裴炎名犯武宗廟諱者何詭諛梯亂肇殺機也裴為顧命大臣屢白天后歸政御史崔察廷詰裴曰若不有異謀何故白太后歸政天后遂發怒斬裴于都亭驛故書曰崔察賊殺中書令裴張守珪以安禄山叛者何貸刑怫教稔禍階也祿山乃張守珪部将嘗犯令張曲江令守珪案之守珪不從卒使亂天下故書張守珪以安禄山叛他皆倣此稱天下殺者何罪暴天下示衆與殺也稱天子殺者何死非其罪示衆不與殺也臣或不書卒者何不以直終去卒以示貶也君或不書葬者何不以正終去葬以示譏也懼怠云瑞示戒志沴尚德必書賤尸位則黜貴皆所以敺邪合正俾歸大義則前所謂起王后配天皇條天后年號行事繫于中宗之類是也操實寘例以示懲勸前所謂李勣立皇后武氏張守珪以禄山叛之類是也嗚呼宰相升沈人於十數年間史官出没人於千百歲後是史官與宰相分挈死生權也為史官者不能忭直骨於枯墳臠諂魄於下泉磨毫黷扎叢閣飽帙豈國家任史官意耶樵既序其略授其友髙錫望傳之矣武皇遺劎録武皇帝得利劍於希夷之間提攜六年而四用之宜其庻績暉如哉往者北戎猖狂渝盟盜壃大出虜門戍卒屢奔武皇赫然奮雷霆之威驅貔武之師靖邊塵於塞垣復帝子於敵庭非武皇一用其劎耶賊鎭阻兵邀爵山東刼衆以濟其奸擘險以扞其誅王師萃之屢戰無功兵衂将稽賊勢益張并醜乘之遂萌梟心乃刼吾兵乃固吾城反書既聞卒愕京師輿人謡曰上宜亟以節假之且赦其辜俾守北門以伐敵謀不然并且東連潞兵北合戎師分卒以趨太行巻甲以下河東國家其能甘心於潞冦耶武皇曾不逗撓於其𠂻亟發武符按言誅之羽檄朝馳夕擒并頑非武皇再用其劎耶并部既平潞守益堅王師吿勞國用吿虚内外咨嗟訛言沸騰飛言上聞上為不聞誅潞之心益牢責戰之詔日􅃊卒能克大憝於山東梟渠魁於國門非武皇帝三用其劎耶浮屠之流其來綿綿根盤蔓滋日熾而昌蠱於民心蠶於民生力屈財殫民恬不知武皇始議除之女泣于閨男號于途廷臣辨之於朝䙝臣爭之於㫄羣疑膠牢萬口一辭武皇曾不待疑卒詔有司驅羣髠而髮之毁其居而田之其徒既㣲其教僅存民瘼其瘳國用有加風雨以時災沴不生非武皇四用其劎耶今者嗣皇帝纂武皇之耿光傳武皇之遺劎宜乎銛其鍔不使其挫寳其刃不使其泥而又硎之以義淬之以智匣之以禮苞之以仁持之以信與天下終始天下幸甚龍多山録梓潼南鄙越五百里其中有山崛起中天即山之趾得逕委延舉武三十北出其巔氣象鮮妍孕成隂烟屹石巉巉别為東巗槎牙重複爭先角逐若絶若裂若缺若穴突者虎怒企者猿踞横者木仆挺者碑植又有似乎飛簷連軒􅟝櫨交攅欹撑兀柱懸棟危礎殊狀詭類愕不得視下有畝平砥若戶庭攄乳側脉膏停泓石俯對絶壑鈔臨蘭薄仙臺摽異藂石負起屹與山别猿鳥磧絶腹竇而空路由其中齗齶相望攀縁上下闖然而出曜見白日始時永嘉飛眞葢羅人傳晉永嘉中有為葢羅者於北臺上學道焉葢羅於此白日上升今臺下有碑誌存焉者也去蹤斯存石刻傳聞丹成而蛻駕鶴騰天一去遼廓千載寂寞澄泉傳靈别壑絶明風閒境清寂寥無聲嘉木美竹岡巒交植風來怒黒雷動崖谷山禽嵓獸捷翔牙驚曉吟暝啼聽之悽悽迴環下矚萬類在目洇山帶川青縈碧聨莽蒼際天杳杳不分月上于東日薄于泉魄朗輪昏出入目前其或宿霧朝雲糊空縛山漠漠漫漫莫知其端陽曜始浴徹天昏紅輪髙而赤洪流散射濃透薄釋綿裂綺折千状萬態倐然收霽樵起耒而遊泊車而休登降信㝛聞見習熟始曰山乎曾未始有得乎無處夸世釣名者汚此巖扃乎且欲聞於潁陽之徒乎孫可之集巻五欽定四庫全書孫可之集巻六唐孫樵撰
