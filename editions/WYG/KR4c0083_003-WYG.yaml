  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0083_WYG_003-1a, image: WYG1083/WYG1083-0071c.png}
body:
  text: 孫可之集巻三唐孫樵撰書何易于何易于嘗為益昌令縣距刺史治所四十里城嘉陵河南刺史崔朴嘗乘春自上游多從賓客歌酒泛舟東下直出益昌㫄至則索民挽舟易于即腰笏引舟上下刺史驚一有呌字問狀易于曰方春百姓不耕即蠶隙不可奪易于為屬令當其無事可以充役刺史與賓客跳出舟偕騎還去益昌民多即山樹茶利私自入㑹鹽鐡官奏重𣙜筦詔下所在不得為百姓匿易于視詔曰益昌不征茶百姓尚不可活矧厚其賦以毒民乎命吏剗去吏爭曰天子詔所在不得為百姓匿今剗去罪愈重吏止死明府公一有寧字􅊵竄海裔一無裔字耶易于曰吾寧愛一身以毒一邑民乎亦不使罪蔓爾曹即自縱火焚之觀察一作風使聞其状以易于挺身為民卒不加劾邑民死䘮子弱業破不能具葬者易于輒出俸錢使吏為辦百姓入常賦有垂白僂杖者易于必召坐食問政得失庭有競民易于皆一作輒親自與語為指白枉直罪小者勸大者杖悉立遣之不以付吏治益昌三年獄無繫民民不知役改綿州羅江令其治視益昌是時故一無故字相國裴公刺史一作出鎭綿州獨能嘉易于治嘗從觀其政道從不過三人其合一作察易于廉一有約字如是㑹昌五年樵道出益昌民有能言何易于治狀者且曰天子設上下考以勉吏而易于考止中上何哉樵曰易于督賦如何曰止請常期不欲緊一作堅繩百姓使賤出粟帛督役如何曰度支費不足遂出俸錢冀優貧民饋給徃來權勢如何曰傳符外一無所與擒盜如何曰無盜樵曰予居長安一有中十二字歲一作年聞給事中校考則曰某人為某縣得上下考由考一作某人由上下考得某官問其政則曰某人能督賦先期而畢某人能督役省度支費某人當道能得徃來達官為好言某人能擒若干盜反若干盜一無四字縣令得上下考者如此邑民不對笑去樵以為當世一有在字上位者皆知求才一作財為切至如緩急補吏則曰吾患無以共治膺命舉賢則曰吾患無以塞詔及其有之知者何人哉繼而言之使何易于不有得於生必有得於死者有史官在書田將軍邊事背臨卭南馳越二百里得嚴道郡實與沈黎越嶲俱為邊城迫一作逼下同於羣蠻田在賓將軍刺嚴道三年能條悉南蠻事為樵言曰巴蜀西迫于戎南迫于蠻宜有以制之者當廣德建中之間西戎兩飲馬於岷江其衆如蟻前鋒魁健皆擐五屬之甲持倍尋之㦸徐呼按一作接步且戰且進蜀兵遇鬭如植橫堵羅戈如林發矢如䖟皆折刅吞鏃不能斃一戎而況陷其陣乎然其戎兵踐吾地日深而疫死者日衆即自度不能留亦輒引去故蜀人為之語曰西戎尚可南蠻殘我自南康公鑿青谿道以和羣蠻俾由蜀而貢又擇羣蠻子弟叢一作聚于錦城使習書算業就輒去復以他繼如此垂五十年不絶其來則其學於蜀者不啻千百故其國人皆能習知巴蜀土風山川要害文皇帝三年南蠻果大入成都門其三門四日而旋一本無其三門四日而旋七字非其所剽掠自成都以南越嶲以北八百里之間民畜為空加以敗卒貧民持兵羣聚因緣刧殺官不能禁由是西蜀十六州至今為病自是以來羣蠻常有屠蜀之心居則息畜聚粟動則練兵講戰一作武而又俾其習於蜀者伺連帥之間隙察兵賦之虚實或聞蜀之細民苦於重征且將啓之以幸非常李丞相固言鎭西時有編民李權者遣子齎書通蠻言蜀無備可取狀邊城獲之按問得實遂棄市至今或有踵其所為者吾不知羣蠻此舉大劒以南為國家所有乎且每歲發卒以戍南者皆成都頑民飽稻飫豕十九如瓠雖知鉦鼓之數不習山川之險吾嘗伺其來朔風正嚴緩步坦途日次一舍固巳呀然汗矣而況厯重阻即嚴程束甲而趨扶㦸而鬭耶加以為將者刻薄以自入餽運者縱吏而鼠竊縣官當給帛則以苦一作疎而易良當賑粟則以砂而參粒每歲當給帛主将輒先市輕帛以易其重帛然後散諸邊卒當給糧丁吏必先盜其米然後以砂補其數以給邊卒常以為怨如此則邊卒將怨望之不暇又安能殊死而力戰乎此巴蜀所以為憂也樵曰誠如將軍言苟為國家計者孰若詔嚴道沈黎越嶲三城太守俾度其要害按其壁壘得自募卒以守之且兵籍於郡則易為役卒出於邊則習其險而又各於其部繕相美地分卒為屯春夏則耕蠶以資衣食秋冬則嚴壁以俟冦敵連帥即能督之歲遣廉白吏視其卒之有無劾其守之不法者以聞如此則縣官無餽運之費奸吏無因縁之盜兵足食給卒無胥怨於將軍何如田將軍曰如此何患言卒遂書書褒城驛壁褒城驛號天下第一及得寓目視其沼則淺混而茅一作汙視其舟則離敗而膠庭除甚蕪堂廡甚殘一作淺烏覩其所謂宏麗者訊於驛吏則曰忠穆公嘗牧梁州以褒城控三節度治所龍節虎旗馳驛犇軺以去以來轂交蹄劘由是崇侈其驛以示雄大葢當時視他驛為壯且一歲賓至者不下數百輩苟夕得其庇飢得其飽皆莫至朝去寧有顧惜心耶至如棹舟則必折篙破舷碎鷁而後止魚釣則必枯泉汨泥盡魚而後止至有飼馬於軒宿隼於堂凡所以汙敗室廬糜毁器用官小者其下雖氣猛可制官大者其下益暴橫難禁由是日益破碎不與曩類其曹八九輩雖以供饋之隟一二力治之其能補數十百人殘暴乎語未既有老甿笑於㫄且曰舉今州縣皆驛也吾聞開元中天下冨蕃號為理平踵千里者不裹糧長子孫者不知兵今者天下無金革之聲而戶口一作編氓日益破疆場無侵削之虞而墾田日益寡生民日益困財力日益竭其故何哉凡與天子共治天下者刺史縣令而巳以其耳目接於民而政令速於行也今朝廷命官既巳輕任刺史縣令而又促數於更易且刺史縣令遠者三歲一更近者一二歲再更故州縣之政苟有不利於民可以出意革去其甚者在刺史曰明日我即去何用如此在縣令亦曰明日我即去何用如此當愁醉醲當飢飽鮮一作愁當醉飢當飽囊帛櫝金笑與秩終嗚呼州縣眞驛耶矧更代之隟黠吏因緣恣為奸欺以賣州縣者乎如此而欲望生民不困財力不竭戸口不破墾田不寡難哉予既揖退老甿條其言書于褒城驛屋壁孫可之集巻三欽定四庫全書孫可之集巻四唐孫樵撰
