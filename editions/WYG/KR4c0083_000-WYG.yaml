body:
  text: 孫可之集别集類一唐提要臣等謹案孫可之集十巻唐孫樵撰樵字可之又字隠之自稱闗東人函谷以外幅員遼闊不知其籍何郡縣也大中九年進士授中書舍人僖宗幸岐隴時詔赴行在遷職方郎中上柱國賜紫金魚袋新唐書藝文志通志通考皆載樵經緯集三巻書録解題稱樵自為序凡三十五篇此本十巻為毛晉汲古閣所刋稱王鏊從内閣抄出近時汪師韓集有孫文志疑序一篇因謂樵文惟唐文粹所載後佛寺奏讀開元雜報書襄城驛刻武侯碑隂文貞公笏銘與李諫議行方書與賈秀才書孫氏西齋銘書田將軍邊事書何易于十篇為真餘一十五篇皆後人偽撰然巻帙分合古書多有未可以是定真偽且師韓别無確據但以其句字格局斷之尤不足以為定論也乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書孫可之集巻一唐孫樵撰
  hash: sha256:8e8e7f555c52de3ecffb35ccbe23bfc48acacb6cd551606a3b605b5c943940d9
