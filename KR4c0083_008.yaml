  text: 唐孫樵集第八卷
  hash: sha256:68d56aca9048fc121de301784433ae6274a5e5a5c9b6678d85bc50a1ca68a618
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0083_SBCK_008-1a}
body:
  text: 文貞公笏銘潼關甲銘康鐐郎中墓銘刻􅐥矦碑陰舜城碑文貞公笏銘大中六年詔出文貞公笏歸其孫丞相謨孫樵請銘其笏曰靈豸豸角比干獻骨合此憤烈在公為笏怒虎可唾笏不可挫太􅏞可裂笏不可折拄天不仄指日不蝕摽儀條臆起梗開直噫諫舌切上磨帝缺不逆不怫笏則公笏緊拱折列諍舌不發膠榮顧餗下偷上愎非公之節孰為公笏潼關甲銘并序潼戶呀東翼廉敞南有玄甲數十扎焉委于前楹澀塵飄風綴斷革刓樵過而誚之且曰此國之閫也是小欲遏冦偷大欲扼諸侯今者關禁弛而不譏守甲存而不完將何抑天下心而割天子憂耶關吏笑而進曰借如潼之甲可以燭日潼之旗可以絳天戰鞞晝驚驚柝夜鳴吾曹將擺堅荷鍛投死地之不戰又安得與客合繻而東合繻而西哉今上君臨萬邦號令所加風清日明理為大和如此則關之禁何為而申嚴關之甲何為而繕堅玄宗四十二年關中之兵其屯如雲孽胡西來叱而闢之守甲之不完耶古之善守天下者展禮以防之闡樂以和之明刑以齊之修政以固之則其守在四海之外何以關為而況完其甲乎是天下愈安而其禁愈弛天下愈平而其甲愈弊耳樵將去之且銘其甲云潼關之甲完吾孰與安潼關之甲弊吾孰與濟甲乎甲乎理與爾謀亂與爾謀無俾工爾修唐故倉部郎中康公墓志銘並序唐尚書倉部郎中姓康氏以咸通十三年月日薨於鄭州官舍其年月日前左拾遺陳晝畫一作寓書孫樵曰與子俱恩康公門今先遠有期其孤徴志於子子其無讓樵哭之慟巳而揮涕叙平生公諱某字某會稽人曽祖諱某贈某官祖諱某贈某官父諱某贈某官公幼嗜書及冠能屬詞尤攻四六文章援毫立成淸媚新峭學者無能如自宣城來長安三舉進士登上第是歲會昌元年也其年冬得博學宏詞授祕書省正字明年臨桂元公以觀風支使來辟換試祕書郎五年調再授祕書省校書郎大中二年復調授京兆府參軍其年冬為進士試官峭獨不顧雖權勢莫能撓其與選者不逾年繼踵升第故中書侍郎高公璩尚書倉部郎中楊嵓太常博士杜敏求今春官二卿崔公殷夢尚書屯田郎中崔亞前左拾遺陳晝畫一作洎樵十輩皆出其等列也明年授大理評事兼監察御史戶部巡官明年攺鹽鐡巡官天付介直不能諂言故丞相河東公休使鹽鐵轉運公或請計事將入門裴公謂謁者曰必康君也裴公始以直知終以直廢明年去鹽鐵詔授大理司直或有所讞宰相莫能回其筆明年授賜大理司議郎兼侍御史度支巡官明年攺授檢校戶部員外郎兼侍御史轉運推官明年換判官今華州刺史李公訥拜鹽鐵轉運使將蒞事且召羣吏曰二十年巳旋推官判官誰為廉平可以助吾治者羣吏皆以公塞問李公曰吾得之矣公由是不去職咸通元年攺檢校禮部郎中兼侍御史充轉運判官李公始以廉平知終以章奏加厚常稱於班行間曰康公轉運推官明年換判官今華州刺史李公訥拜鹽鐵轉運使將蒞事且召羣吏曰二十年巳旋推官判官誰為廉平可以助吾治者羣吏皆以公塞問李公曰吾得之矣公由是不去職咸通元年攺檢校禮部郎中兼侍御史充轉運判官李公始以廉平知終以章奏加厚常稱於班行間曰康公宜掌帝制或與宰相言必慰薦之明年詔授海州刺史廉而不刻明而不抉案牘符檄公一以口授之羣胥輩徒搦管捉𥿄字字書出蓄縮汗栗何暇為奸犯耶以故老吏猾胥畏之如神明秩罷退居淮陰咸通八年詔拜大理少卿明年遷尚書倉部郎中充西川宣諭制置鹽法使兼西川供軍使賜紫金魚袋公馳驛至西川不浹旬而鹽無二價蜀氓至今賴之㑹西川節度使劉公以疾薨戍兵日至軍儲不給糗無常價而度支有定估遂乘傳詣門且請與度支計事無何詔以竇滂代公公遂守倉部郎中會竇滂逗遛不以時之任朝廷欲以警之其年十一月遂貶公為醴州剌史明年移鄭州長史朝廷或有繁難之任議莫不以公為言宰相且將用之嗚呼天殱正人誠疲民之不幸非公之不幸也公娶長樂馮氏故給事中纍贈太尉諱審第三女也公十二男八女長曰齊鄉貢進士次曰顔鄉貢進士次曰言明經及第次曰某某某長女適鹽州防禦判官試大理評事高遲七女未筓夫人自京師携其孤奔喪于管城某年九月三日以公之喪權窆于孟州河陰縣某鄉里銘曰㑹稽之英斗牛之靈併鍾德門公實挺生月中攀桂日下馳名藝閣淸秩牢盆美聲出牧東海二卿棘寺鵷行望郎錦川星使騏驥蹀足蛟龍得水富貴可期烟霄漸邇謫非其罪天道寧論不復雙闕遽歸九泉圃田發紖河陰封樹勒石載銘庶幾終古刻􅐥侯碑陰赤帝子火熾四百年天厭其熱洎獻燼矣􅐥侯獨不憤不顧收死灰於蜀欲噓而再燃之難艱一作乎為力哉是以四稱武岐雍間地不尺闊抑非智不周天意炳炳然也夫以武侯之賢寧靡籌其不可也蓋激備隆中天下託不欲曲肱安穀終兒女子手將驅馳死備志耶由是核武矦之所為殆庶幾矣然跨西南一隅與吳魏抗國提卒數萬綽綽乎去留無我枝者是亦善為兵矣史壽以為短應變真抑武矦哉俾武矦不早入地曹之君臣將奔走固圉之不暇鍾鄧寧能越巖懸兵決勝指取耶是井終之野與武侯存亡俱矣天殱武矦其不愛劉愈明白其姜維何力焉曩蟠南陽時人不與仲毅伍洎受社稷寄擅刑賞柄曾心不愧畏人不疑黷何意氣明信卓卓也武矦死五百載迄今梁漢之民歌道遺烈廟而祭者如在其愛於民如此而久也獨謂武矦之治比於燕奭彼屠齊城合諸矦在下矣舜城碑帝承天休纂堯之勳啓宫于蒲守不以城帝守以城孰守不城阻湖為池限􅏞為門波非不狂巖非不崇守不以仁社為周遷將蒙監扶理土朔方萬里扞胡貽謀子孫始訖其功阿房巳墟帝豈不城城在民和自􅏞洎夷罔不順同屹為國垣以藩有虞其堅如金其厚如坤蕩蕩巍巍牢不可屠四罪雖頑莫敢來攻一家熙熙相視而安帝配商均不私以城帝死蒼梧授之夏家太甲不修帝城乃頽唯此帝城哲王獨知求之民心乃見其基帝城雖隳築之不難無寧無荒帝城復高不識不知相傳峻隅其板雖崇其築難堅非帝之心孰為帝城乙丑春吳馡考訂鋟於石香館唐孫樵集第八卷
