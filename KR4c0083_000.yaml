body:
  text: 明吴馡重訂第一卷大明宮賦露臺遺基賦岀蜀賦第二卷與李諫議行方書與高錫望書寓汴州觀察判官書與賈希逸書與王霖書與友生論文書第三卷書何易于書田將軍邊事書褒城驛第四卷梓潼移江記興元新路記蕭相國寫眞讚第五卷孫氏西齋錄􅐥皇遺劒錄龍多山錄第六卷迎春奏復佛寺奏第七卷序西南夷序陳進士舉寓居對乞巧對第八卷文貞公笏銘潼關甲銘康鐐郎中墓銘刻武侯碑陰舜城碑第九卷逐痁鬼文祭高諌議文祭梓潼神君文第十卷讀開元雜報罵僮志復召堰籍唐孫樵集目錄終鐫唐孫樵經緯集記竣劉復愚賸簡之梓流布識者愈慨千年文塚幾以夷于陵谷劉生自誌丘墓洵廼埋憂地下者矣馡嘗謂吾黨中處人代寔爲前古後今闗係見有佳篇幽墨若不爲之表章聽其湮没是大残忍人不爲無罪於天地故友生結聚最喜偵訪所知文家幾輩所貯文藁幾種務爲發隱闡幽借鈔廣播力及卽爲鐫行使當世有不掩之文後先燈續曾與同心發弘誓願行此功德于秇林永不退諉然每遇人不免捧岀相示廼有攘爲帳秘者遭其活埋不勝痛恨比之殺諸慧命辠業馡亦自箴犯不善䕶持之戒甲子長夏偕羣季侍家大人于南磵樓居深柳覆牕塔光照席茶香淸供家樂甚洽大人懲馡愛惜人才不得其道反招罪咎命幡家笥重以牙籖題識載行譏察忽及大人手訂諸編有經緯集爲孫可之自定著作在唐與劉復愚名埒欲以並行又得王文恪吴下舊本林茂之閩本參攷文苑等籍釐正相沿之謬鄢中鄭見羲先生聞之請同較閱遂爲中和以來復存可之靣目隨助剞劂之金從臾速成廼直以唐孫樵題集者存古遺意使姓名彰彰不磨而晚近易于通曉願見是集者發廣大心立拔猜忌私吝孽根毋使古魂㘅恨九京縑緗夜泣耳因作緣起于前以爲勸請歲天啓乙丑蓮花生日吴馡于字祖堂滌研濡豪正冠稽首製
  hash: sha256:0b0d72e88a1b4bbf6f6f7a129d6f2fd68814816b4964ee86aebbd74e89b7645a
