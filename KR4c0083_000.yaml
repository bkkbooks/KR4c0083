front:
  text: 自序樵家本關東代襲簮纓藏書五千卷常自探討糿而工文得之真訣提筆入貢士列于時以文學見稱大中九年叨登上第從軍邠國忝歷􅏞資久居蘭省廣明元年狂寇犯闕駕避岐隴詔赴行在遷職方郎中朝廷以省方蜀國文物攸興品藻朝倫旌其才行詔曰行在三絶右散騎常侍李潼有曾閔之行職方郎中孫樵有揚馬之文前進士司空圖有巢由之風列在靑史以彰有唐中興之德樵遂閲所著文及碑碣書檄傳記銘志得二百餘篇藂其可觀者三十五篇編成十卷藏諸篋笥以貽子孫是歲中和四年也朝散大夫尚書職方郎中上柱國賜緋魚袋孫樵唐孫樵集目録
  hash: sha256:7ea4aefb712e28820d4a4fd13aadb8bb266dad4ae422f84f060d00d09c678fa7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0083_SBCK_000-1a}
body:
  text: 明吳馡重訂第一卷大明宮賦露臺遺基賦出蜀賦第二卷與李諫議行方書與高錫望書寓汴州觀察判官書與賈希逸書與王霖書與友生論文書第三卷書何易于書田將軍邊事書褒城驛第四卷梓潼移江記興元新路記蕭相國寫真讚第五卷孫氏西齋録􅐥皇遺劒録龍多山録第六卷迎春奏復佛寺奏第七卷序西南夷序陳進士舉寓居對乞巧對第八卷文貞公笏銘潼關甲銘康鐐郎中墓銘刻武侯碑陰舜城碑第九卷逐痁鬼文祭高諌議文祭梓潼神君文第十卷讀開元雜報罵僮志復召堰籍唐孫樵集目録終鐫唐孫樵經緯集記竣劉復愚賸簡之梓流布識者愈慨千年文冢幾以夷于陵谷劉生自志丘墓洵乃埋憂地下者矣馡嘗謂吾黨中處人代實為前古後今關係見有佳篇幽墨若不為之表章聽其湮沒是大殘忍人不為無罪於天地故友生結聚最喜偵訪所知文家幾輩所貯文藁幾種務為發隱闡幽借鈔廣播力及即為鐫行使當世有不掩之文後先燈續曾與同心發弘誓願行此功德于藝林永不退諉然每遇人不免捧出相示乃有攘為帳祕者遭其活埋不勝痛恨比之殺諸慧命罪業馡亦自針犯不善護持之戒甲子長夏偕羣季侍家大人于南澗樓居深柳覆窗塔光照席茶香淸供家樂甚洽大人懲馡愛惜人才不得其道反招罪咎命幡家笥重以牙籖題識載行譏察忽及大人手訂諸編有經緯集為孫可之自定著作在唐與劉復愚名埒欲以並行又得王文恪吳下舊本林茂之閩本參考文苑等籍釐正相沿之謬鄢中鄭見羲先生聞之請同較閲遂為中和以來復存可之靣目隨助剞劂之金從臾速成乃直以唐孫樵題集者存古遺意使姓名彰彰不磨而晚近易于通曉願見是集者發廣大心立拔猜忌私吝孽根毋使古魂銜恨九京縑緗夜泣耳因作緣起于前以為勸請歲天啓乙丑蓮花生日吳馡于字祖堂滌研濡豪正冠稽首製
  hash: sha256:d48bcfe2989898cf823916b62728dfddb7d1f03aea3ef6de7a0623762c95bf18
