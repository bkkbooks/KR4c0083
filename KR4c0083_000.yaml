front:
  text: 自序樵家本闗東代襲簮纓藏書五千卷常自探討糿而工文得之眞訣提筆入貢士列于時以文學見稱大中九年叨登上第從軍邠國忝歷􅏞資久居蘭省廣明元年狂宼犯闕駕避岐隴詔赴行在遷職方郎中朝廷以省方蜀國文物攸興品藻朝倫旌其才行詔曰行在三絶右散騎常侍李潼有曾閔之行職方郎中孫樵有揚馬之文前進士司空圖有巢由之風列在靑史以彰有唐中興之德樵遂閱所著文及碑碣書檄傳記銘誌得二百餘篇藂其可觀者三十五篇編成十卷藏諸篋笥以貽子孫是歲中和四年也朝散大夫尚書職方郎中上柱國賜緋魚袋孫樵唐孫樵集目錄
  hash: sha256:a305eeb26920cfc19b107172f575e539c0800a26b540b05b7688580e1335ed72
  markers:
