body:
  text: 迎春奏復佛寺奏迎春奏黑帝歷窮帝命青帝嗣其公其無私自注以皇帝備牲牢鼓鐘迎饗于郊東賤臣樵寓疏太常上奏曰天有四時陛下實行之是天乘陛下政令明昏而為燠寒也青帝何功而饗乎寬空春之日陛下廩以時出帛以時恤則蘖牙弩拔勾萌畢逹矣夏之日陛下農事無所奪山麓無所伐則草木壯茁國無夭札矣秋之日陛下獄無曲次畋無圍殺則霜露不失節萬物固結矣冬之日陛下地氣不掘泄室屋不徹發則豐隆不敢繫越百蟄塞穴矣聖人之時日南無驕陽啓蟄無繁霜斗北無伏陰火西無滯霖淫昏之世反膏而波大水廢民廬舍自注春行秋令反氷而花夏令能李花自注冬行雹傷螟嚙行冬令則自注夏融飛蔽天雨雹時則旱赤雨血雨血時則赤旱千里自注秋行夏令則是陛下政令出乎修明則寒暑運行政令出乎淫昏則災祲屢臻其可忽乎臣又聞陛下與人為春得革慘作和起枿生􅏞喜滿其家沃穆歡咳如暖景時開樹色煙光覺蔥蘢芳蒼陛下與人為秋得愁刮人魄風日泠白栗栗蕭索覺庭槐枯落陛下與人為夏得變絺成襦噓燼作爐駒驅轍結雜遝噎禊門如三伏熱陛下與人為冬得舉皆不見日涷薄人骨間間戚戚燈青火白門無蹄轍迹顧陛下左右皆春天下病悴者衆也陛下肘腋皆熱中國病涷者衆也豈陛下用心有頗焉陛下苟能平其心雖澤不周惠不均天下無恨言不然天將視陛下心燠寒也復佛寺奏賤臣樵上言臣以為殘蠧於理者羣髠最大且十口之家中戶也自注謂男力而耕女力而桑卒歲其衣食僅自給也棟宇僅自完也若羣髠者所飽必稻粱所衣必綿錦一作縠居則邃宇出則肥馬是則中戶不十不足以活一髠􅐥皇帝元年籍天下羣髠凡十七萬夫以十家給一髠是編民百七十萬困於羣髠矣􅐥皇帝一旦髮天下髠悉歸平民是時一百七十萬家之心咸知生地陛下自即位以來詔管營一作廢寺以復羣髠自元年正月即位以來洎今年五月斤斧之聲不絶天下而工未巳訊聞陛下即復之不休臣恐數年之間天下十七萬髠如故矣臣以為􅐥皇帝即不能除羣髠陛下尚宜勉思而去之以蘇疲民況將興於巳廢乎請以開元之事明之開元之年大駕還自東封從以千官之衆六軍之士三日留於陳留民猶有餘力今陛下即能東封道次給一食則民力殫矣何開元之民力有餘而陛下之民力不足耶開元之間率戶出兵共出若干兵也自注索若干戶籍而為伍春夏縱之家以力耕稼秋冬聚之將以戒􅐥事如此則兵未始廢於農農未嘗奪於兵故開元之民力有餘也今天下常兵不下百萬皆衣食於平民歲度費率中戶五僅能活一兵如此則編戶不五百萬不足以給之故陛下之民力不足也今陛下以力不足之民而欲重困於羣髠將何以踵開元太平事耶貞觀以還開元戶口最為殷繁不能逾九百萬即今有問於戶部其能如開元乎借如陛下以五百萬給天下之兵今欲又以一百七十萬給於羣髠是六百七十萬無羡賦矣即令戶口不下於開元其餘止二百萬而國家萬故畢出其間陛下孰與其足耶即是鹽鐡不可除而榷管加算矣天下之民得不重困乎日者陛下嘗欲營國東門諫議大夫入爭於前一言未及終陛下非徒輟其工而又賜帛以優之今所復寺宇豈特國門之急乎叢徒嘯工豈特國門之使乎寧諫議大夫不以言而陛下不以聽耶陛下則不能復廢之臣願陛下巳復之髠止而勿復加巳營之寺止而勿復修庶幾天下之民尚可活也今天下最不可去者兵也尚為陛下日夜思去兵之術究開元太平事兾異日為陛下言之況去無用之髠耶臣昧死以言乙丑春吳馡考訂鋟於石香館唐孫樵集第六卷
